<!DOCTYPE html>
<html lang="zh-CN" data-theme="business">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - TikTok Live Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/email-verification-flow.js"></script>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center mb-2">找回密码</h2>
            <p class="text-center text-base-content/60 mb-6">通过邮箱验证码重置登录密码</p>

            <div id="errorMsg" class="alert alert-error hidden mb-4">
                <span id="errorText"></span>
            </div>
            <div id="successMsg" class="alert alert-success hidden mb-4">
                <span id="successText"></span>
            </div>

            <form onsubmit="handleResetPassword(event)">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">邮箱</span></label>
                    <input type="email" id="reset-email" class="input input-bordered w-full" placeholder="请输入注册邮箱" required autofocus>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">邮箱验证码</span></label>
                    <div class="join w-full">
                        <input type="text" id="reset-email-code" class="input input-bordered join-item flex-1" placeholder="6位数字" maxlength="6" required>
                        <button type="button" id="resetSendCodeBtn" class="btn btn-primary join-item">发送验证码</button>
                    </div>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">新密码</span></label>
                    <input type="password" id="reset-password" class="input input-bordered w-full" placeholder="至少6个字符" minlength="6" required>
                </div>
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text">确认新密码</span></label>
                    <input type="password" id="reset-confirm-password" class="input input-bordered w-full" placeholder="再次输入新密码" required>
                </div>
                <button type="submit" id="resetBtn" class="btn btn-primary w-full">
                    <span id="resetBtnText">重置密码</span>
                </button>
            </form>

            <div class="divider">返回</div>
            <p class="text-center text-sm">
                <a href="/login.html" class="link link-primary">返回登录</a>
            </p>
        </div>
    </div>

    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = '/';
        }

        async function checkResetEmailTarget(email) {
            try {
                const res = await fetch('/api/auth/check-code-target', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ purpose: 'reset_password', email })
                });
                const data = await res.json();
                if (!res.ok) {
                    return { ok: false, error: data.error || '该邮箱不可用于找回密码' };
                }
                return { ok: true };
            } catch (err) {
                return { ok: false, error: '校验邮箱失败，请稍后重试' };
            }
        }

        const forgotEmailCodeFlow = EmailVerificationFlow.create({
            emailInput: '#reset-email',
            sendButton: '#resetSendCodeBtn',
            purpose: 'reset_password',
            beforeOpen: checkResetEmailTarget,
            onError: showError,
            onSent: () => showSuccess('验证码已发送，请查收邮箱'),
        });

        function showError(message) {
            document.getElementById('successMsg').classList.add('hidden');
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMsg').classList.remove('hidden');
        }

        function showSuccess(message) {
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successText').textContent = message;
            document.getElementById('successMsg').classList.remove('hidden');
        }

        async function handleResetPassword(event) {
            event.preventDefault();
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');

            const email = document.getElementById('reset-email').value.trim();
            const emailCode = document.getElementById('reset-email-code').value.trim();
            const newPassword = document.getElementById('reset-password').value;
            const confirmPassword = document.getElementById('reset-confirm-password').value;
            const btn = document.getElementById('resetBtn');
            const btnText = document.getElementById('resetBtnText');

            if (newPassword.length < 6) {
                showError('新密码至少6个字符');
                return;
            }
            if (newPassword !== confirmPassword) {
                showError('两次输入的新密码不一致');
                return;
            }

            btn.disabled = true;
            btnText.textContent = '重置中...';
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, emailCode, newPassword })
                });
                const data = await res.json();
                if (!res.ok) {
                    btn.disabled = false;
                    btnText.textContent = '重置密码';
                    showError(data.error || '重置失败');
                    return;
                }

                btnText.textContent = '重置成功';
                showSuccess(data.message || '密码已重置，请使用新密码登录');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1200);
            } catch (err) {
                btn.disabled = false;
                btnText.textContent = '重置密码';
                showError('网络错误，请重试');
            }
        }
    </script>
</body>
</html>
