<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-nav-active="user-center">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/auth.js"></script>
    <script src="/nav_shared.js"></script>
    <style>
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInUp 0.3s ease both;
        }

        .uc-tab-btn {
            transition: all 0.2s;
            border-radius: 0.5rem;
            padding: 0.5rem 1.25rem;
            font-weight: 600;
            font-size: 0.875rem;
            opacity: 0.5;
        }

        .uc-tab-btn.active {
            opacity: 1;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }

        .uc-tab-btn:hover {
            opacity: 0.8;
        }

        .stat-mini {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 0.875rem;
            padding: 1.25rem 1.5rem;
        }
    </style>
</head>

<body class="page-bg">
    <div id="app-navbar"></div>

    <div class="max-w-5xl mx-auto px-4 py-8">

        <!-- Page Header -->
        <div class="mb-6 animate-fade-in">
            <h1 class="text-2xl font-bold">用户中心</h1>
            <p class="text-base-content/40 text-sm mt-1" id="welcomeText">加载中...</p>
        </div>

        <!-- Tab Navigation -->
        <div class="flex gap-1 mb-6 glass-card p-1.5 w-fit animate-fade-in-up">
            <button class="uc-tab-btn active" onclick="switchTab('sub',this)">💎 我的订阅</button>
            <button class="uc-tab-btn" onclick="switchTab('balance',this)">📊 余额明细</button>
            <button class="uc-tab-btn" onclick="switchTab('orders',this)">📋 订单记录</button>
            <button class="uc-tab-btn" onclick="switchTab('profile',this)">👤 个人设置</button>
        </div>

        <!-- ── Tab 1: Subscription ──────────────────────────── -->
        <div id="tab-sub" class="tab-content active">
            <!-- Stats row -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <div class="stat-mini">
                    <div class="text-xs opacity-40 mb-1">账户余额</div>
                    <div class="text-2xl font-bold text-accent" id="balanceVal">—</div>
                    <div class="mt-2">
                        <button onclick="document.getElementById('rechargeModal').showModal()"
                            class="btn btn-xs rounded-lg"
                            style="background:rgba(212,175,55,0.15);border-color:rgba(212,175,55,0.3);color:#fbbf24">+
                            充值</button>
                    </div>
                </div>
                <div class="stat-mini">
                    <div class="text-xs opacity-40 mb-1">当前套餐</div>
                    <div class="text-2xl font-bold text-primary truncate" id="planVal">—</div>
                    <div class="text-xs opacity-40 mt-1" id="planExpiry"></div>
                </div>
                <div class="stat-mini">
                    <div class="text-xs opacity-40 mb-1">房间配额</div>
                    <div class="text-2xl font-bold" id="roomVal">—</div>
                    <div id="roomProgress" class="mt-2"></div>
                </div>
            </div>

            <!-- Subscription card + Notifications -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Plan detail card -->
                <div class="glass-card p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold">套餐详情</h3>
                        <a href="/landing/subscription.html" class="btn btn-xs btn-outline rounded-lg">管理套餐</a>
                    </div>
                    <div id="subCard">
                        <div class="text-center py-8 opacity-40"><span class="loading loading-spinner"></span></div>
                    </div>
                </div>

                <!-- Notifications -->
                <div class="glass-card p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold flex items-center gap-2">
                            系统通知
                            <span id="notifBadge" class="badge badge-error badge-sm hidden">0</span>
                        </h3>
                        <button id="markAllBtn" onclick="markAllRead()"
                            class="btn btn-xs btn-ghost rounded-lg hidden">全部已读</button>
                    </div>
                    <div id="notifList" class="space-y-2 max-h-[340px] overflow-y-auto pr-1">
                        <div class="text-center py-8 opacity-40"><span class="loading loading-spinner"></span></div>
                    </div>
                </div>
            </div>

            <!-- Addons -->
            <div class="glass-card p-6 mt-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold">房间加量包</h3>
                    <a href="/landing/subscription.html#addons" class="btn btn-xs btn-outline rounded-lg">购买加量包</a>
                </div>
                <div id="addonList">
                    <div class="text-center py-8 opacity-40"><span class="loading loading-spinner"></span></div>
                </div>
            </div>
        </div>

        <!-- ── Tab 2: Balance ────────────────────────────────── -->
        <div id="tab-balance" class="tab-content">
            <div class="glass-card p-6 mb-6">
                <div class="flex items-center justify-between mb-1">
                    <div>
                        <div class="text-xs opacity-40">当前余额</div>
                        <div class="text-3xl font-bold text-accent mt-1" id="balanceBig">—</div>
                    </div>
                    <button onclick="document.getElementById('rechargeModal').showModal()"
                        class="btn gradient-btn text-white rounded-xl px-6">充值账户</button>
                </div>
            </div>

            <div class="glass-card overflow-hidden">
                <div class="p-4 border-b border-white/5">
                    <h3 class="font-bold text-sm">余额变动记录</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="table dark-table w-full">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>变动</th>
                                <th>余额</th>
                                <th>类型/说明</th>
                            </tr>
                        </thead>
                        <tbody id="balanceLogBody">
                            <tr>
                                <td colspan="4" class="text-center py-10 opacity-30">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ── Tab 3: Orders ─────────────────────────────────── -->
        <div id="tab-orders" class="tab-content">
            <div class="glass-card overflow-hidden">
                <div class="p-4 border-b border-white/5">
                    <h3 class="font-bold text-sm">充值和订购记录</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="table dark-table w-full">
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>金额</th>
                                <th>支付方式</th>
                                <th>状态</th>
                                <th>时间</th>
                            </tr>
                        </thead>
                        <tbody id="orderBody">
                            <tr>
                                <td colspan="5" class="text-center py-10 opacity-30">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ── Tab 4: Profile ────────────────────────────────── -->
        <div id="tab-profile" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Basic Info -->
                <div class="glass-card p-6">
                    <h3 class="font-bold mb-5">基本资料</h3>
                    <form id="profileForm" onsubmit="updateProfile(event)" class="space-y-4">
                        <div class="form-control">
                            <label class="label pb-1"><span class="label-text opacity-60 text-xs">邮箱地址
                                    (不可修改)</span></label>
                            <input type="email" id="profileEmail"
                                class="input input-bordered glass-input rounded-xl opacity-50 cursor-not-allowed"
                                readonly>
                        </div>
                        <div class="form-control">
                            <label class="label pb-1"><span class="label-text opacity-60 text-xs">昵称</span></label>
                            <input type="text" id="profileNickname" class="input input-bordered glass-input rounded-xl"
                                placeholder="你的显示名称" maxlength="30">
                        </div>
                        <button type="submit" id="profileBtn"
                            class="btn gradient-btn text-white rounded-xl w-full">保存修改</button>
                    </form>
                </div>

                <!-- Change Password -->
                <div class="glass-card p-6">
                    <h3 class="font-bold mb-5">修改密码</h3>
                    <form id="passwordForm" onsubmit="changePassword(event)" class="space-y-4">
                        <div class="form-control">
                            <label class="label pb-1"><span class="label-text opacity-60 text-xs">当前密码</span></label>
                            <div class="relative">
                                <input type="password" id="oldPassword"
                                    class="input input-bordered glass-input rounded-xl w-full" placeholder="••••••••"
                                    required>
                            </div>
                        </div>
                        <div class="form-control">
                            <label class="label pb-1"><span class="label-text opacity-60 text-xs">新密码
                                    (至少6位)</span></label>
                            <input type="password" id="newPassword" class="input input-bordered glass-input rounded-xl"
                                placeholder="••••••••" required minlength="6">
                        </div>
                        <div class="form-control">
                            <label class="label pb-1"><span class="label-text opacity-60 text-xs">确认新密码</span></label>
                            <input type="password" id="confirmPassword"
                                class="input input-bordered glass-input rounded-xl" placeholder="••••••••" required>
                        </div>
                        <button type="submit" id="pwdBtn" class="btn btn-outline rounded-xl w-full">更新密码</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- ── Recharge Modal ─────────────────────────────────── -->
    <dialog id="rechargeModal" class="modal">
        <div class="modal-box glass-card border border-white/8 max-w-md">
            <h3 class="font-bold text-lg mb-6">账户充值</h3>

            <div class="mb-4">
                <div class="text-xs opacity-40 mb-2">快速选择金额</div>
                <div class="grid grid-cols-3 gap-2">
                    <button class="amount-btn btn btn-sm btn-outline rounded-xl"
                        onclick="selectAmount(30, this)">¥30</button>
                    <button class="amount-btn btn btn-sm btn-outline rounded-xl"
                        onclick="selectAmount(50, this)">¥50</button>
                    <button class="amount-btn btn btn-sm btn-outline rounded-xl"
                        onclick="selectAmount(100, this)">¥100</button>
                    <button class="amount-btn btn btn-sm btn-outline rounded-xl"
                        onclick="selectAmount(200, this)">¥200</button>
                    <button class="amount-btn btn btn-sm btn-outline rounded-xl"
                        onclick="selectAmount(500, this)">¥500</button>
                    <button class="amount-btn btn btn-sm btn-outline rounded-xl"
                        onclick="selectAmount(1000, this)">¥1000</button>
                </div>
            </div>

            <div class="form-control mb-6">
                <label class="label pb-1"><span class="label-text opacity-60 text-xs">自定义金额 (元)</span></label>
                <input type="number" id="customAmount" class="input input-bordered glass-input rounded-xl"
                    placeholder="输入自定义金额" min="1" max="10000" oninput="selectAmount(parseInt(this.value)||0, null)">
            </div>

            <div class="form-control mb-6">
                <div class="text-xs opacity-40 mb-2">选择支付方式</div>
                <div class="grid grid-cols-2 gap-2">
                    <button class="pay-btn btn btn-outline rounded-xl btn-sm active-pay" id="pay-balance"
                        onclick="selectPay('balance',this)">💰 余额支付</button>
                    <button class="pay-btn btn btn-outline rounded-xl btn-sm opacity-40 cursor-not-allowed" disabled
                        title="即将上线">💳 微信/支付宝</button>
                </div>
            </div>

            <div class="modal-action gap-2">
                <form method="dialog">
                    <button class="btn btn-ghost rounded-xl">取消</button>
                </form>
                <button id="rechargeBtn" class="btn gradient-btn text-white rounded-xl px-8"
                    onclick="doRecharge()">确认充值</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button></button></form>
    </dialog>

    <script>
        let selectedAmount = 100;
        let selectedPayMethod = 'balance';

        // ── Tab Switching ───────────────────────────────────────
        function switchTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.uc-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            btn.classList.add('active');
        }

        // ── Formatters ──────────────────────────────────────────
        function fmtCny(cents) { return '¥' + (cents / 100).toFixed(2); }
        function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }); }
        function fmtTime(d) { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('zh-CN') + ' ' + dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }

        function statusBadge(s) {
            const m = { active: 'badge-success', expired: 'badge-error', pending: 'badge-warning', paid: 'badge-success', failed: 'badge-error', refunded: 'badge-ghost' };
            const n = { active: '有效', expired: '已过期', pending: '待支付', paid: '已支付', failed: '失败', refunded: '已退款' };
            return `<span class="badge ${m[s] || 'badge-ghost'} badge-sm">${n[s] || s}</span>`;
        }

        // ── Load All Data ───────────────────────────────────────
        async function loadData() {
            try {
                const [subRes, balRes, orderRes, notifRes] = await Promise.all([
                    fetch('/api/subscription'),
                    fetch('/api/payment/balance'),
                    fetch('/api/subscription/orders?limit=30'),
                    fetch('/api/auth/notifications?limit=25')
                ]);

                const [sub, bal, orders, notifs] = await Promise.all([
                    subRes.json(), balRes.json(), orderRes.json(), notifRes.json()
                ]);

                renderStats(sub, bal);
                renderSubCard(sub);
                renderAddons(sub.addons || []);
                renderBalanceLog(bal.logs || [], bal.balance || 0);
                renderOrders(orders.orders || []);
                renderNotifs(notifs.data || []);

                // Profile fields
                const me = await fetch('/api/auth/me');
                if (me.ok) {
                    const u = await me.json();
                    document.getElementById('profileEmail').value = u.email || '';
                    document.getElementById('profileNickname').value = u.nickname || '';
                }

            } catch (err) {
                showToast('数据加载失败，请刷新重试', 'error');
                console.error(err);
            }
        }

        function renderStats(sub, bal) {
            document.getElementById('balanceVal').textContent = fmtCny(bal.balance || sub.balance || 0);
            document.getElementById('balanceBig').textContent = fmtCny(bal.balance || sub.balance || 0);
            document.getElementById('planVal').textContent = sub.plan?.name || '未订阅';
            document.getElementById('planExpiry').textContent = sub.daysRemaining >= 0 ? `剩余 ${sub.daysRemaining} 天` : '';

            const room = sub.roomUsage;
            if (room) {
                const limit = room.totalLimit === -1 ? '∞' : room.totalLimit;
                document.getElementById('roomVal').textContent = `${room.current || 0} / ${limit}`;
                if (room.totalLimit && room.totalLimit !== -1) {
                    const pct = Math.min(100, Math.round((room.current || 0) / room.totalLimit * 100));
                    document.getElementById('roomProgress').innerHTML =
                        `<progress class="progress progress-primary w-full h-1.5" value="${pct}" max="100"></progress>`;
                }
            }
        }

        function renderSubCard(sub) {
            const el = document.getElementById('subCard');
            if (!sub.plan || sub.plan.code === 'none') {
                el.innerHTML = `
          <div class="text-center py-6">
            <div class="text-4xl mb-3">📦</div>
            <p class="text-sm opacity-50 mb-4">当前未订阅任何套餐</p>
            <a href="/landing/subscription.html" class="btn gradient-btn text-white btn-sm rounded-xl px-6">立即订阅</a>
          </div>`;
                return;
            }
            const cycles = { monthly: '月付', quarterly: '季付', annual: '年付' };
            el.innerHTML = `
        <div class="space-y-3">
          <div class="flex justify-between">
            <span class="opacity-50 text-sm">套餐</span>
            <strong class="text-primary">${sub.plan.name}</strong>
          </div>
          <div class="flex justify-between">
            <span class="opacity-50 text-sm">计费周期</span>
            <span>${cycles[sub.billingCycle] || sub.billingCycle || '—'}</span>
          </div>
          <div class="flex justify-between">
            <span class="opacity-50 text-sm">到期时间</span>
            <span>${sub.endDate ? fmtDate(sub.endDate) : '—'}</span>
          </div>
          <div class="flex justify-between">
            <span class="opacity-50 text-sm">AI 分析额度</span>
            <span>${sub.aiCreditsRemaining ?? '—'}</span>
          </div>
          <div class="gradient-divider"></div>
          <a href="/landing/subscription.html" class="btn btn-outline btn-block btn-sm rounded-xl">续费或更换套餐</a>
        </div>`;
        }

        function renderAddons(addons) {
            const el = document.getElementById('addonList');
            if (!addons.length) {
                el.innerHTML = '<div class="text-center py-6 opacity-30 text-sm">暂无加量包</div>';
                return;
            }
            el.innerHTML = `<div class="space-y-2">${addons.map(a => `
        <div class="flex justify-between items-center p-3 rounded-xl" style="background:var(--glass-bg)">
          <div>
            <div class="text-sm font-medium">+${a.room_count} 个房间</div>
            <div class="text-xs opacity-40">${a.package_name} · 至 ${fmtDate(a.end_date)}</div>
          </div>
          ${statusBadge(a.status)}
        </div>`).join('')}</div>`;
        }

        function renderBalanceLog(logs, balance) {
            const typeNames = { recharge: '充值', subscription: '订购', admin_adjust: '管理员调整', refund: '退款', purchase: '购买', deduction: '扣费' };
            const body = document.getElementById('balanceLogBody');
            body.innerHTML = logs.length === 0
                ? '<tr><td colspan="4" class="text-center py-10 opacity-30">暂无记录</td></tr>'
                : logs.map(l => {
                    const pos = l.amount > 0;
                    return `<tr>
              <td class="text-xs opacity-50 whitespace-nowrap">${fmtTime(l.created_at)}</td>
              <td class="font-mono font-bold ${pos ? 'text-success' : 'text-error'}">${pos ? '+' : ''}${fmtCny(l.amount)}</td>
              <td class="font-mono text-xs opacity-60">${fmtCny(l.balance_after)}</td>
              <td><div class="badge badge-ghost badge-xs mb-1">${typeNames[l.type] || l.type}</div><div class="text-xs opacity-40 max-w-[140px] truncate">${l.description || '—'}</div></td>
            </tr>`;
                }).join('');
        }

        function renderOrders(ords) {
            const body = document.getElementById('orderBody');
            body.innerHTML = ords.length === 0
                ? '<tr><td colspan="5" class="text-center py-10 opacity-30">暂无订单</td></tr>'
                : ords.map(o => `<tr>
            <td class="font-mono text-xs opacity-50">${o.order_no}</td>
            <td class="font-bold">${fmtCny(o.amount)}</td>
            <td><span class="badge badge-ghost badge-sm">${o.payment_method || '—'}</span></td>
            <td>${statusBadge(o.status)}</td>
            <td class="text-xs opacity-40">${fmtTime(o.created_at)}</td>
          </tr>`).join('');
        }

        function renderNotifs(notifs) {
            const el = document.getElementById('notifList');
            const badge = document.getElementById('notifBadge');
            const btn = document.getElementById('markAllBtn');
            const unread = notifs.filter(n => !n.isRead).length;

            if (unread > 0) {
                badge.textContent = unread > 99 ? '99+' : unread;
                badge.classList.remove('hidden');
                btn.classList.remove('hidden');
            }

            el.innerHTML = notifs.length === 0
                ? '<div class="text-center py-8 opacity-30 text-sm">🎉 暂无通知</div>'
                : notifs.map(n => `
            <div onclick="markRead(${n.id}, this)" class="p-3 rounded-xl cursor-pointer transition-all border ${n.isRead ? 'border-transparent opacity-50 hover:opacity-70' : 'border-primary/20 bg-primary/5 hover:border-primary/40'}">
              <div class="flex justify-between items-start gap-2">
                <span class="font-semibold text-sm flex items-center gap-1.5">
                  ${!n.isRead ? '<span class="w-1.5 h-1.5 rounded-full bg-error shrink-0"></span>' : ''}
                  ${n.title}
                </span>
                <span class="text-[10px] opacity-30 shrink-0">${fmtDate(n.createdAt)}</span>
              </div>
              ${n.content ? `<p class="text-xs opacity-50 mt-1 line-clamp-2">${n.content}</p>` : ''}
            </div>`).join('');
        }

        async function markRead(id, el) {
            try {
                await fetch(`/api/auth/notifications/${id}/read`, { method: 'PUT' });
                el.classList.add('border-transparent', 'opacity-50');
                el.classList.remove('border-primary/20', 'bg-primary/5');
            } catch { }
        }

        async function markAllRead() {
            try {
                await fetch('/api/auth/notifications/read-all', { method: 'PUT' });
                document.getElementById('notifBadge').classList.add('hidden');
                document.getElementById('markAllBtn').classList.add('hidden');
                document.querySelectorAll('#notifList [onclick]').forEach(el => {
                    el.classList.add('border-transparent', 'opacity-50');
                    el.classList.remove('border-primary/20', 'bg-primary/5');
                });
            } catch { }
        }

        // ── Profile Update ──────────────────────────────────────
        async function updateProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('profileBtn');
            btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span>';
            btn.disabled = true;
            try {
                const res = await fetch('/api/auth/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: document.getElementById('profileNickname').value.trim() })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error);
                showToast('资料更新成功', 'success');
            } catch (err) { showToast(err.message || '更新失败', 'error'); }
            btn.innerHTML = '保存修改';
            btn.disabled = false;
        }

        // ── Password Change ─────────────────────────────────────
        async function changePassword(e) {
            e.preventDefault();
            const np = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;
            if (np !== cp) { showToast('两次密码不一致', 'error'); return; }
            const btn = document.getElementById('pwdBtn');
            btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span>';
            btn.disabled = true;
            try {
                const res = await fetch('/api/auth/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword: document.getElementById('oldPassword').value, newPassword: np })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error);
                showToast('密码修改成功，请重新登录', 'success');
                document.getElementById('passwordForm').reset();
                setTimeout(() => window.logout(), 2000);
            } catch (err) { showToast(err.message || '修改失败', 'error'); }
            btn.innerHTML = '更新密码';
            btn.disabled = false;
        }

        // ── Recharge ────────────────────────────────────────────
        function selectAmount(val, btn) {
            selectedAmount = val;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('btn-primary'));
            if (btn) btn.classList.add('btn-primary');
            document.getElementById('customAmount').value = btn ? '' : val;
        }

        function selectPay(method, btn) {
            selectedPayMethod = method;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('btn-primary'));
            btn.classList.add('btn-primary');
        }

        async function doRecharge() {
            if (!selectedAmount || selectedAmount < 1) { showToast('请选择或输入充值金额', 'warning'); return; }
            const btn = document.getElementById('rechargeBtn');
            const orig = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> 创建订单...';
            btn.disabled = true;
            try {
                const res = await fetch('/api/payment/recharge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: selectedAmount * 100, paymentMethod: selectedPayMethod })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error);
                showToast('充值订单创建成功！', 'success');
                document.getElementById('rechargeModal').close();
                setTimeout(loadData, 1500);
            } catch (err) { showToast(err.message || '充值失败', 'error'); }
            btn.innerHTML = orig;
            btn.disabled = false;
        }

        // ── Init ────────────────────────────────────────────────
        window.initPage({
            requireAuth: true,
            onReady(user) {
                document.getElementById('welcomeText').textContent = `欢迎回来，${user.nickname || user.email}`;
                loadData();
            }
        });

        selectAmount(100, null);
    </script>
</body>

</html>
