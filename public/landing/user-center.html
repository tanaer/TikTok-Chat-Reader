<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="/nav_shared.js"></script>
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(184, 134, 11, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Custom scrollbar for tables and lists */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="min-h-screen text-base-content relative" style="font-family: 'Inter', system-ui, sans-serif;">
    <div id="app-navbar"></div>
    <div class="max-w-6xl mx-auto px-4 py-8">

        <div id="alertBox" class="alert shadow-lg mb-6 hidden font-medium transition-all"></div>

        <!-- Main Tab Navigation -->
        <div role="tablist"
            class="tabs tabs-boxed mb-6 bg-base-100/60 backdrop-blur-md shadow-lg border border-white/5 inline-flex p-2">
            <a role="tab" class="tab tab-active h-10 px-6 font-bold text-base" onclick="switchTab('sub', this)">💎
                我的订阅</a>
            <a role="tab" class="tab h-10 px-6 font-bold text-base" onclick="switchTab('balance', this)">📊 余额明细</a>
            <a role="tab" class="tab h-10 px-6 font-bold text-base" onclick="switchTab('orders', this)">📋 订单记录</a>
            <a role="tab" class="tab h-10 px-6 font-bold text-base" onclick="switchTab('profile', this)">👤 个人设置</a>
        </div>

        <!-- Tab 1: Subscription -->
        <div id="tab-sub" class="uc-tab block transition-opacity duration-300">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Left Column -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- Stats Row -->
                    <div
                        class="stats stats-vertical sm:stats-horizontal shadow-xl bg-base-100/60 backdrop-blur-md border border-white/5 w-full">
                        <div class="stat">
                            <div class="stat-title opacity-70">账户余额</div>
                            <div class="stat-value text-accent text-3xl" id="balanceValue">-</div>
                            <div class="stat-desc mt-1 opacity-50 flex gap-2 items-center">
                                <span id="balanceSub">可用代金券与本金</span>
                                <button class="btn btn-xs btn-accent"
                                    onclick="document.getElementById('rechargeModal').showModal()">充值</button>
                            </div>
                        </div>

                        <div class="stat">
                            <div class="stat-title opacity-70">当前套餐</div>
                            <div class="stat-value text-3xl text-primary truncate" id="planValue">-</div>
                            <div class="stat-desc mt-1 font-medium" id="planSub"></div>
                        </div>

                        <div class="stat">
                            <div class="stat-title opacity-70">房间配额使用率</div>
                            <div class="stat-value text-3xl" id="roomValue">-</div>
                            <div class="stat-desc mt-1 font-medium text-warning" id="roomSub"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Subscription Mini Card -->
                        <div class="card bg-base-100/60 backdrop-blur-md shadow-xl border border-white/5 h-full">
                            <div class="card-body p-6">
                                <h2 class="card-title text-lg flex items-center gap-2 mb-2">
                                    <span class="text-xl">💎</span> 我的订阅
                                </h2>
                                <div id="subscriptionCard" class="flex-grow flex flex-col justify-center min-h-[80px]">
                                    <span class="loading loading-dots loading-sm opacity-50"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Addon Packages -->
                        <div class="card bg-base-100/60 backdrop-blur-md shadow-xl border border-white/5 h-full">
                            <div class="card-body p-6">
                                <h2 class="card-title text-lg flex items-center justify-between mb-0">
                                    <span class="flex items-center gap-2"><span class="text-xl">🧩</span> 房间加量包</span>
                                </h2>
                                <div id="addonList"
                                    class="flex-grow flex flex-col gap-3 my-4 overflow-y-auto custom-scrollbar max-h-40">
                                    <span class="loading loading-dots loading-sm opacity-50"></span>
                                </div>
                                <div class="card-actions justify-end mt-auto" style="display:none;"
                                    id="addonPurchaseBox">
                                    <a href="#buy-addon" class="btn btn-outline btn-sm btn-block hidden">购买加量包(暂未开放)</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Notifications -->
                <div class="space-y-6">
                    <div class="card bg-base-100/70 backdrop-blur-md shadow-xl border border-white/5">
                        <div class="card-body p-0">
                            <div
                                class="px-5 py-4 flex justify-between items-center border-b border-base-content/10 bg-base-200/30 rounded-t-2xl">
                                <h2 class="font-bold flex items-center gap-2">
                                    <span class="text-xl">🔔</span> 系统通知
                                    <span id="notifBadge"
                                        class="badge badge-error badge-sm ml-1 hidden border-none text-white shadow-sm"></span>
                                </h2>
                                <button class="btn btn-xs btn-ghost text-accent hover:bg-accent/20"
                                    onclick="markAllRead()" id="markAllBtn" style="display:none;">全部已读</button>
                            </div>
                            <div id="notifList" class="p-3 space-y-2 overflow-y-auto custom-scrollbar max-h-[400px]">
                                <div class="py-10 text-center opacity-50 flex justify-center"><span
                                        class="loading loading-spinner"></span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Balance Log -->
        <div id="tab-balance" class="uc-tab hidden transition-opacity duration-300">
            <div class="card bg-base-100/50 backdrop-blur-md shadow-xl border border-white/5">
                <div class="card-body p-0">
                    <h2
                        class="px-5 py-4 font-bold border-b border-base-content/10 flex items-center gap-2 bg-base-200/30 rounded-t-2xl">
                        <span class="text-xl">📊</span> 余额变动明细
                    </h2>
                    <div class="overflow-y-auto custom-scrollbar max-h-[600px]">
                        <table class="table table-sm">
                            <thead>
                                <tr class="text-base-content/60 sticky top-0 bg-base-100/90 backdrop-blur z-10">
                                    <th class="pl-5">时间</th>
                                    <th>金额/结余</th>
                                    <th class="pr-5">说明</th>
                                </tr>
                            </thead>
                            <tbody id="balanceLogBody">
                                <tr>
                                    <td colspan="3" class="text-center py-6 opacity-50">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Orders -->
        <div id="tab-orders" class="uc-tab hidden transition-opacity duration-300">
            <div class="card bg-base-100/50 backdrop-blur-md shadow-xl border border-white/5">
                <div class="card-body p-0">
                    <h2
                        class="px-6 py-4 text-lg font-bold border-b border-base-content/10 flex items-center gap-2 bg-base-200/30 rounded-t-2xl">
                        <span class="text-xl">📋</span> 订单记录
                    </h2>
                    <div class="overflow-x-auto custom-scrollbar max-h-[600px]">
                        <table class="table table-zebra table-sm">
                            <thead>
                                <tr
                                    class="text-base-content/60 border-b border-base-content/20 sticky top-0 bg-base-100/90 backdrop-blur z-10">
                                    <th class="pl-6 font-medium">订单号</th>
                                    <th class="font-medium">金额</th>
                                    <th class="font-medium">方式</th>
                                    <th class="font-medium">状态</th>
                                    <th class="pr-6 font-medium">时间</th>
                                </tr>
                            </thead>
                            <tbody id="orderBody">
                                <tr>
                                    <td colspan="5" class="text-center py-6 opacity-50">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 4: Profile Settings -->
        <div id="tab-profile" class="uc-tab hidden transition-opacity duration-300">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full lg:max-w-4xl">
                <!-- Profile Settings Card -->
                <div class="card bg-base-100/60 backdrop-blur-md shadow-lg border border-white/5">
                    <div class="card-body p-6">
                        <h2
                            class="card-title text-lg flex items-center gap-2 mb-4 border-b border-base-content/10 pb-4">
                            <span class="text-primary">👤</span> 基本信息
                        </h2>

                        <form id="profileForm" class="space-y-4" onsubmit="handleUpdateProfile(event)">
                            <div class="form-control">
                                <label class="label"><span class="label-text">邮箱账号</span></label>
                                <input type="email" id="profileEmail"
                                    class="input input-bordered bg-base-200/50 cursor-not-allowed text-base-content/60"
                                    disabled />
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text">显示昵称</span></label>
                                <input type="text" id="profileNickname" placeholder="您的显示名称"
                                    class="input input-bordered bg-base-200/50 focus:border-primary transition-colors" />
                            </div>
                            <div class="flex justify-end mt-4 pt-2">
                                <button type="submit" class="btn btn-primary px-8 shadow-sm"
                                    id="profileBtn">保存更改</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Password Change Card -->
                <div class="card bg-base-100/60 backdrop-blur-md shadow-lg border border-white/5">
                    <div class="card-body p-6">
                        <h2
                            class="card-title text-lg flex items-center gap-2 mb-4 border-b border-base-content/10 pb-4">
                            <span class="text-accent">🔒</span> 安全设置
                        </h2>

                        <form id="passwordForm" onsubmit="handleChangePassword(event)" class="space-y-4">
                            <div class="form-control">
                                <label class="label"><span class="label-text">当前密码</span></label>
                                <div class="relative">
                                    <input type="password" id="oldPassword"
                                        class="input input-bordered w-full bg-base-200/50 pr-10 focus:border-accent transition-colors"
                                        placeholder="输入当前密码" required autocomplete="current-password" />
                                    <button type="button"
                                        class="absolute inset-y-0 right-0 px-3 flex items-center opacity-50 hover:opacity-100"
                                        onclick="togglePwd('oldPassword')">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                            viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text">新密码</span></label>
                                <div class="relative">
                                    <input type="password" id="newPassword"
                                        class="input input-bordered w-full bg-base-200/50 pr-10 focus:border-accent transition-colors"
                                        placeholder="至少6位新密码" required minlength="6" autocomplete="new-password" />
                                    <button type="button"
                                        class="absolute inset-y-0 right-0 px-3 flex items-center opacity-50 hover:opacity-100"
                                        onclick="togglePwd('newPassword')">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                            viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text">确认新密码</span></label>
                                <div class="relative">
                                    <input type="password" id="confirmNewPassword"
                                        class="input input-bordered w-full bg-base-200/50 pr-10 focus:border-accent transition-colors"
                                        placeholder="再次输入新密码" required minlength="6" autocomplete="new-password" />
                                    <button type="button"
                                        class="absolute inset-y-0 right-0 px-3 flex items-center opacity-50 hover:opacity-100"
                                        onclick="togglePwd('confirmNewPassword')">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                            viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="mt-4 pt-2 flex justify-end">
                                <button type="submit" class="btn btn-accent px-8 shadow-sm" id="pwdBtn">修改密码</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Recharge Modal -->
    <dialog id="rechargeModal" class="modal">
        <div class="modal-box p-0 overflow-hidden bg-base-100/95 backdrop-blur-xl">
            <h3
                class="font-bold text-lg bg-base-200/50 px-6 py-4 border-b border-base-content/10 flex items-center gap-2">
                <span class="text-2xl">💳</span> 余额充值
            </h3>
            <div class="p-6">
                <div class="mb-5">
                    <div class="text-sm opacity-60 mb-3">选择充值金额</div>
                    <div class="flex flex-wrap gap-2 sm:gap-3" id="rechargeAmounts">
                        <button class="btn btn-outline btn-sm hover:btn-accent transition-all"
                            onclick="selectAmount(1000, this)">¥10</button>
                        <button class="btn btn-outline btn-sm hover:btn-accent transition-all"
                            onclick="selectAmount(5000, this)">¥50</button>
                        <button class="btn btn-accent btn-sm shadow-md transition-all active-amount"
                            onclick="selectAmount(10000, this)">¥100</button>
                        <button class="btn btn-outline btn-sm hover:btn-accent transition-all"
                            onclick="selectAmount(30000, this)">¥300</button>
                        <button class="btn btn-outline btn-sm hover:btn-accent transition-all"
                            onclick="selectAmount(50000, this)">¥500</button>
                        <button class="btn btn-outline btn-sm hover:btn-accent transition-all"
                            onclick="selectAmount(100000, this)">¥1000</button>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="text-sm opacity-60 mb-3">选择支付方式</div>
                    <div class="flex flex-wrap gap-3" id="payMethods">
                        <button class="btn btn-outline btn-primary btn-sm active-method shadow-sm"
                            onclick="selectPayMethod('alipay', this)">
                            <svg viewBox="0 0 1024 1024" class="w-4 h-4 mr-1" fill="currentColor">
                                <path
                                    d="M720.896 525.824c15.872-46.08 24.576-96.256 27.648-150.016l-206.336 0.512c0 0-4.096-78.336-4.096-80.384l230.912 0c21.504 0 38.912-17.408 38.912-38.912s-17.408-38.912-38.912-38.912L540.672 218.112C534.528 153.6 534.528 153.6 534.528 153.6c0-21.504-17.408-38.912-38.912-38.912s-38.912 17.408-38.912 38.912l0 65.536-193.024 0c-21.504 0-38.912 17.408-38.912 38.912s17.408 38.912 38.912 38.912l193.024 0 0 80.384L230.4 376.832c-21.504 0-38.912 17.408-38.912 38.912s17.408 38.912 38.912 38.912L456.704 454.656c-13.824 37.376-32.256 71.68-54.784 103.424-40.96-33.792-88.064-58.88-138.24-73.216-20.48-5.632-41.984 6.144-48.128 26.112-5.632 20.48 6.144 41.984 26.624 48.128 72.704 20.48 139.776 56.32 195.584 104.96-56.32 40.448-120.832 69.632-190.464 85.504-20.992 4.608-34.304 25.088-29.696 46.08 4.096 17.92 19.968 30.208 37.888 30.208 2.56 0 5.632-0.512 8.192-1.024 93.184-21.504 177.664-62.976 250.368-120.32 60.416 46.08 129.024 79.872 201.728 98.304 5.12 1.024 9.728 1.536 14.848 1.536 17.408 0 32.768-11.776 37.376-29.184 5.12-20.992-7.68-42.496-28.672-47.616-56.832-14.336-110.08-40.96-157.696-78.336 43.52-52.224 77.824-112.128 100.352-177.152l87.552 45.056c6.144 3.072 13.312 4.608 19.968 4.608 13.824 0 27.648-7.68 34.304-20.48 9.728-18.944 2.048-43.008-17.408-52.736L720.896 525.824zM503.296 612.864C471.552 562.176 432.128 516.608 387.072 478.72c21.504-32.256 38.912-67.072 50.176-103.424l46.08-0.512C481.28 471.552 489.984 547.328 503.296 612.864z">
                                </path>
                            </svg>
                            支付宝
                        </button>
                        <button
                            class="btn btn-outline btn-success btn-sm hover:btn-success hover:text-white transition-all"
                            onclick="selectPayMethod('wxpay', this)">
                            <svg viewBox="0 0 1024 1024" class="w-4 h-4 mr-1" fill="currentColor">
                                <path
                                    d="M699.2 388.9c0-117.8-115.6-213.3-258.1-213.3s-258.1 95.5-258.1 213.3c0 62.6 32.7 118.8 84.1 157.5-6.6 22.3-21.7 65.6-25 76.6-4.5 14.8 11.2 13.8 20.2 8.6 12-7.1 76-46.6 92.2-56.9 27 7.7 55.9 11.9 86.2 11.9 142.1 0 258.5-95.2 258.5-213.1z.1-7.4-.1-14.8-.4-22 0-1.8 0-3.6-.1-5.3-2 1.3-4.1 2.5-6.2 3.7-22.3 12.5-47 22.8-73.6 30.7-3.6 1.1-7.2 2.1-10.9 3.1-40.8 11.1-84.3 17.5-129.9 18.6h-5.5c-30.8 0-60.8-4-89.6-11.7h-1.3c-23-6.1-45-14.2-65.7-24.3-15.5-7.6-30.4-16.1-44.5-25.5-3.6-2.4-7.2-4.9-10.7-7.4-48-34.9-79.6-86.4-86-145 0-1.3-.1-2.7-.1-4 0-142 138-257.6 308-257.6s308 115.6 308 257.6c.1 123.6-104.3 226.7-242.9 252 5.5-3.3 11-6.8 16.4-10.4 12.5-8.4 20.4-8 16.1 7-3.3 11.3-18.1 53-24.9 75.3 49-36.5 81-90.4 81-150.8M312.8 335.5c-19.8 0-35.8-16-35.8-35.8 0-19.8 16-35.8 35.8-35.8s35.8 16 35.8 35.8-16 35.8-35.8 35.8zm256.3 0c-19.8 0-35.8-16-35.8-35.8 0-19.8 16-35.8 35.8-35.8 19.8 0 35.8 16 35.8 35.8 0 19.8-16 35.8-35.8 35.8zm-155.6 94.7c17.5 0 31.7-14.2 31.7-31.7 0-17.5-14.2-31.7-31.7-31.7-17.5 0-31.7 14.2-31.7 31.7 0 17.5 14.2 31.7 31.7 31.7zm184.4 0c17.5 0 31.7-14.2 31.7-31.7s-14.2-31.7-31.7-31.7c-17.5 0-31.7 14.2-31.7 31.7.1 17.5 14.3 31.7 31.7 31.7z">
                                </path>
                            </svg>
                            微信支付
                        </button>
                    </div>
                </div>

                <div class="modal-action mt-6 gap-2">
                    <form method="dialog">
                        <button class="btn btn-ghost">取消</button>
                    </form>
                    <button class="btn btn-accent flex-grow shadow-lg" onclick="doRecharge()" id="rechargeBtn">
                        去支付 <strong id="btnAmountText">¥100</strong>
                    </button>
                </div>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>
    </div>

    <!-- Alert Modal (daisyUI native) -->
    <dialog id="messageModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border border-base-content/10">
            <h3 class="font-bold text-lg flex items-center gap-2" id="modalTitle">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-info" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                提示
            </h3>
            <p class="py-4 whitespace-pre-line" id="modalMsg"></p>
            <div class="modal-action">
                <form method="dialog" class="flex gap-2 w-full justify-end">
                    <button class="btn btn-outline opacity-60" id="modalCancelBtn" style="display:none;">取消</button>
                    <button class="btn btn-primary" id="modalConfirmBtn">确定</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) { window.location.href = 'login.html'; }

        let selectedAmount = 10000;
        let selectedPayMethod = 'alipay';

        // Async Modal Function
        function showModal(title, msg, isConfirm = false, isError = false) {
            return new Promise(resolve => {
                const titleIcon = document.querySelector('#modalTitle svg');
                if (isError) {
                    titleIcon.classList.replace('text-info', 'text-error');
                    titleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />';
                } else {
                    titleIcon.classList.replace('text-error', 'text-info');
                    titleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />';
                }

                document.getElementById('modalTitle').innerHTML = titleIcon.outerHTML + `<span>${title}</span>`;
                document.getElementById('modalMsg').innerText = msg;
                const cancelBtn = document.getElementById('modalCancelBtn');
                const confirmBtn = document.getElementById('modalConfirmBtn');

                cancelBtn.style.display = isConfirm ? 'block' : 'none';

                cancelBtn.onclick = () => resolve(false);
                confirmBtn.onclick = () => resolve(true);

                document.getElementById('messageModal').showModal();
                document.getElementById('messageModal').addEventListener('close', () => resolve(false), { once: true });
            });
        }

        // Inline alert (Toast style at top of screen)
        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type} shadow-lg mb-6 font-medium transition-all ${type === 'error' ? 'animate-bounce' : ''}`;
            box.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${type === 'error' ? 'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z' : 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'}" /></svg>
                <span>${msg}</span>
            `;
            box.classList.remove('hidden');
            setTimeout(() => { box.classList.add('hidden'); }, 4000);
        }

        function fmt(cents) { return cents === 0 ? '¥0' : '¥' + (cents / 100).toFixed(cents % 100 === 0 ? 0 : 2); }
        function fmtDate(d) { return d ? new Date(d).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric' }) : '-'; }
        function fmtShortDate(d) { return d ? new Date(d).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }) : '-'; }

        const typeNames = { recharge: '充值', purchase: '套餐', refund: '退款', admin_adjust: '后管调整' };

        const badgeClasses = {
            paid: 'badge-success', pending: 'badge-warning', active: 'badge-success',
            expired: 'badge-ghost opacity-50', cancelled: 'badge-error opacity-70'
        };
        const statusNames = { paid: '已付款', pending: '待付', active: '生效中', expired: '过期', cancelled: '已取消' };
        const statusBadge = s => `<span class="badge ${badgeClasses[s] || 'badge-ghost'} badge-sm font-medium border-base-content/10 shadow-sm">${statusNames[s] || s}</span>`;

        function selectAmount(cents, btnElement) {
            selectedAmount = cents;
            document.querySelectorAll('#rechargeAmounts button').forEach(b => {
                b.classList.remove('btn-accent', 'shadow-md', 'active-amount');
                b.classList.add('btn-outline');
            });
            btnElement.classList.add('btn-accent', 'shadow-md', 'active-amount');
            btnElement.classList.remove('btn-outline');
            document.getElementById('btnAmountText').textContent = fmt(cents);
        }

        function selectPayMethod(m, btnElement) {
            selectedPayMethod = m;
            document.querySelectorAll('#payMethods button').forEach(b => {
                b.classList.replace('btn-primary', 'btn-ghost') || b.classList.replace('btn-success', 'btn-ghost');
                b.classList.remove('border-primary', 'border-success', 'active-method', 'shadow-sm', 'text-white');
                b.classList.add('btn-outline', 'opacity-60');
            });

            btnElement.classList.remove('btn-outline', 'btn-ghost', 'opacity-60');
            btnElement.classList.add('active-method', 'shadow-sm');
            if (m === 'alipay') {
                btnElement.classList.add('btn-primary', 'text-white');
            } else {
                btnElement.classList.add('btn-success', 'text-white');
            }
        }

        async function apiFetch(url, opts = {}) {
            const res = await fetch(url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers } });
            if (res.status === 401) { window.location.href = 'login.html'; return null; }
            return res;
        }

        async function loadDashboard() {
            try {
                const [subRes, balRes, orderRes, notifRes] = await Promise.all([
                    apiFetch('/api/subscription'),
                    apiFetch('/api/payment/balance'),
                    apiFetch('/api/subscription/orders?limit=15'),
                    apiFetch('/api/auth/notifications?limit=25')
                ]);

                if (!subRes || !balRes || !orderRes || !notifRes) return; // Prevent JS errors if 401

                const sub = await subRes.json();
                const bal = await balRes.json();
                const orders = await orderRes.json();
                const notifs = await notifRes.json();

                // Stats Header
                document.getElementById('balanceValue').textContent = fmt(sub.balance || 0);
                document.getElementById('planValue').textContent = sub.plan?.name || '免费版';

                const days = sub.daysRemaining;
                document.getElementById('planSub').textContent = days >= 0 ? `剩余 ${days} 天` : (sub.plan?.code === 'free' ? '免费权益' : '');

                const room = sub.roomUsage;
                document.getElementById('roomValue').textContent = `${room?.current || 0}/${room?.totalLimit === -1 ? '∞' : room?.totalLimit || 1}`;
                if (room?.totalLimit !== -1) {
                    const percent = Math.min(100, Math.round((room?.current || 0) / (room?.totalLimit || 1) * 100));
                    document.getElementById('roomSub').innerHTML = `<progress class="progress progress-warning w-24 mt-2" value="${percent}" max="100"></progress> ${room?.addonRooms ? `<br/><span class="text-xs opacity-70">含加购 +${room.addonRooms}</span>` : ''}`;
                }

                // Subscription mini card
                const sCard = document.getElementById('subscriptionCard');
                if (!sub.plan || sub.plan?.code === 'free' || sub.plan?.code === 'none') {
                    sCard.innerHTML = `
                        <div class="flex flex-col items-center justify-center p-4 text-center">
                            <div class="w-12 h-12 bg-base-200 rounded-full flex items-center justify-center mb-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg></div>
                            <p class="text-sm opacity-60 mb-4">当前未订阅高级套餐</p>
                            <a href="/landing/index.html#pricing" class="btn btn-primary btn-sm rounded-full px-6">浏览所有套餐</a>
                        </div>`;
                } else {
                    const cycleNames = { monthly: '月度', quarterly: '季度', annual: '年度', free: '不限' };
                    sCard.innerHTML = `
                        <div class="flex justify-between items-start mb-6 w-full">
                            <div>
                                <h3 class="font-bold text-xl text-primary">${sub.plan?.name}</h3>
                                <div class="badge badge-outline badge-sm mt-1 border-primary/30 text-primary/80">${cycleNames[sub.billingCycle] || sub.billingCycle}周转</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs opacity-50 font-medium">服务期限</div>
                                <div class="text-sm">${fmtShortDate(sub.startDate)}<br/><span class="opacity-50 text-xs">至</span> ${fmtShortDate(sub.endDate)}</div>
                            </div>
                        </div>
                        <a href="subscription.html" class="btn btn-outline btn-accent btn-sm mt-auto self-end px-6 rounded-lg shadow-sm">续费或管理</a>`;
                }

                // Addons (Feature gating logic display)
                const addonDiv = document.getElementById('addonList');
                const pAddons = sub.addons || [];
                const addonBox = document.getElementById('addonPurchaseBox');
                if (!sub.plan || sub.plan.code === 'free') {
                    addonDiv.innerHTML = '<div class="text-center text-sm opacity-40 py-6 border border-dashed border-base-content/10 rounded-xl">免费版不支持购买加量包</div>';
                    if (addonBox) addonBox.style.display = 'none';
                } else if (pAddons.length === 0) {
                    addonDiv.innerHTML = '<div class="text-center text-sm opacity-40 py-6 border border-dashed border-base-content/10 rounded-xl">无需加量目前够用</div>';
                    if (addonBox) addonBox.style.display = 'block';
                } else {
                    if (addonBox) addonBox.style.display = 'block';
                    addonDiv.innerHTML = pAddons.map(a => `
                        <div class="flex justify-between items-center p-3 bg-base-200/50 rounded-lg hover:bg-base-200 transition-colors border border-base-content/5">
                            <div class="flex items-center gap-3">
                                <div class="avatar placeholder">
                                    <div class="bg-accent/10 text-accent rounded-full w-8 font-bold">+${a.room_count}</div>
                                </div>
                                <div>
                                    <div class="text-sm font-bold">${a.package_name}</div>
                                    <div class="text-xs opacity-50">至 ${fmtShortDate(a.end_date)}</div>
                                </div>
                            </div>
                            ${statusBadge(a.status)}
                        </div>`).join('');
                }

                // Balance log
                const logBody = document.getElementById('balanceLogBody');
                const logs = bal.logs || [];
                if (logs.length === 0) {
                    logBody.innerHTML = '<tr><td colspan="3" class="text-center py-8 opacity-40 border-none">干净得像一张白纸</td></tr>';
                } else {
                    logBody.innerHTML = logs.map(l => {
                        const isIncome = l.amount > 0;
                        return `
                        <tr class="hover">
                            <td class="pl-5 whitespace-nowrap"><div class="text-xs opacity-70">${fmtDate(l.created_at)}</div></td>
                            <td>
                                <div class="${isIncome ? 'text-success' : 'text-error'} font-semibold font-mono">
                                    ${isIncome ? '+' : ''}${fmt(l.amount)}
                                </div>
                                <div class="text-[10px] opacity-40 font-mono">结: ${fmt(l.balance_after)}</div>
                            </td>
                            <td class="pr-5">
                                <div class="badge badge-ghost badge-xs mb-1 opacity-60">${typeNames[l.type] || l.type}</div>
                                <div class="text-xs truncate max-w-[120px]" title="${l.description || '-'}">${l.description || '-'}</div>
                            </td>
                        </tr>`;
                    }).join('');
                }

                // Orders Table
                const orderBody = document.getElementById('orderBody');
                const ords = orders.orders || [];
                if (ords.length === 0) {
                    orderBody.innerHTML = '<tr><td colspan="5" class="text-center py-8 opacity-40 border-none">毫无消费痕迹</td></tr>';
                } else {
                    orderBody.innerHTML = ords.map(o => `
                        <tr class="hover">
                            <td class="pl-6 font-mono text-xs opacity-60">${o.order_no}</td>
                            <td class="font-semibold">${fmt(o.amount)}</td>
                            <td><div class="badge badge-outline badge-sm capitalize border-base-content/20">${o.payment_method || '-'}</div></td>
                            <td>${statusBadge(o.status)}</td>
                            <td class="pr-6 text-xs opacity-60">${fmtDate(o.created_at)}</td>
                        </tr>`).join('');
                }

                // Notifications
                const notifDiv = document.getElementById('notifList');
                const notifItems = notifs.data || [];
                const unreadCount = notifItems.filter(n => !n.isRead).length;
                const badge = document.getElementById('notifBadge');
                const markBtn = document.getElementById('markAllBtn');

                if (unreadCount > 0) {
                    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                    badge.classList.remove('hidden');
                    markBtn.style.display = 'block';
                } else {
                    badge.classList.add('hidden');
                    markBtn.style.display = 'none';
                }

                if (notifItems.length === 0) {
                    notifDiv.innerHTML = `
                        <div class="flex flex-col items-center justify-center p-8 text-center border border-dashed border-base-content/10 rounded-xl my-4 opacity-70">
                            <span class="text-3xl mb-2">🎉</span>
                            <span class="text-sm font-medium">天下太平，暂无通知</span>
                        </div>`;
                } else {
                    notifDiv.innerHTML = notifItems.map(n => `
                        <div class="p-3.5 rounded-xl border transition-all cursor-pointer ${n.isRead ? 'bg-base-200/30 border-base-content/5 hover:border-base-content/20 opacity-70' : 'bg-primary/5 border-primary/20 hover:border-primary/50 shadow-sm'}" onclick="markRead(${n.id}, this)">
                            <div class="flex justify-between items-start gap-2">
                                <span class="font-bold text-sm leading-tight flex items-center gap-1.5 break-all">
                                    ${n.isRead ? '' : '<span class="w-1.5 h-1.5 rounded-full bg-error shrink-0"></span>'}
                                    ${n.title}
                                </span>
                                <span class="text-[10px] opacity-40 shrink-0 mt-0.5">${fmtShortDate(n.createdAt)}</span>
                            </div>
                            ${n.content ? `<p class="mt-1.5 text-xs opacity-70 line-clamp-2 leading-relaxed break-words">${n.content}</p>` : ''}
                        </div>`).join('');
                }

                // Hydrate Profile Fields immediately with auth info
                const meRes = await apiFetch('/api/auth/me');
                if (meRes && meRes.ok) {
                    const userData = await meRes.json();
                    document.getElementById('profileEmail').value = userData.email || '';
                    document.getElementById('profileNickname').value = userData.nickname || '';
                    window.currentUser = userData;
                }
            } catch (err) {
                showAlert('仪表盘加载失败，请刷新重试', 'error');
                console.error(err);
            }
        }

        async function doRecharge() {
            const btn = document.getElementById('rechargeBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-spinner"></span> 正在创建订单...';
            btn.disabled = true;

            try {
                const res = await apiFetch('/api/payment/recharge', {
                    method: 'POST',
                    body: JSON.stringify({ amount: selectedAmount, paymentMethod: selectedPayMethod })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                if (data.payUrl) {
                    await showModal('即将前往支付', '点击确定跳转到第三方支付页面。完成支付后请刷新本页查看余额。', false, false);
                    window.open(data.payUrl, '_blank');
                    // Add reload button after redirecting
                    btn.innerHTML = '已发起支付，点此刷新刷新余额';
                    btn.disabled = false;
                    btn.onclick = () => location.reload();
                    btn.classList.replace('btn-accent', 'btn-success');
                } else {
                    await showModal('创建成功', '充值订单已创建: ' + data.orderNo, false, false);
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    loadDashboard(); // reload to show new order
                }
            } catch (err) {
                showModal('充值受阻', err.message, false, true);
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        async function markRead(id, el) {
            if (el.classList.contains('bg-base-200/30')) return; // already read visual

            try {
                await apiFetch(`/api/auth/notifications/${id}/read`, { method: 'PUT' });
                el.classList.replace('bg-primary/5', 'bg-base-200/30');
                el.classList.replace('border-primary/20', 'border-base-content/5');
                el.classList.remove('hover:border-primary/50', 'shadow-sm');
                el.classList.add('hover:border-base-content/20', 'opacity-70');

                // Remove the unread red dot
                const dot = el.querySelector('.bg-error');
                if (dot) dot.remove();

                // update badge
                const badge = document.getElementById('notifBadge');
                let c = parseInt(badge.textContent || 0);
                if (c > 1) {
                    badge.textContent = c - 1;
                } else {
                    badge.classList.add('hidden');
                    document.getElementById('markAllBtn').style.display = 'none';
                }
            } catch (e) { console.error('Failed to mark read', e) }
        }

        async function markAllRead() {
            try {
                document.getElementById('markAllBtn').innerHTML = '<span class="loading loading-spinner border-none"></span>';
                await apiFetch('/api/auth/notifications/read-all', { method: 'PUT' });
                loadDashboard(); // re-render cleanly
            } catch (e) {
                showAlert('操作失败', 'error');
                document.getElementById('markAllBtn').innerHTML = '全部已读';
            }
        }

        function doLogout() {
            showModal('退出登录', '确定要退出当前账号吗？', true).then(confirmed => {
                if (confirmed) {
                    const rt = localStorage.getItem('refreshToken');
                    fetch('/api/auth/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken: rt }) }).catch(() => null);
                    localStorage.removeItem('accessToken');
                    localStorage.removeItem('refreshToken');
                    window.location.href = 'login.html';
                }
            });
        }

        loadDashboard();
    </script>
</body>

</html>
