<!DOCTYPE html>
<html lang="zh-CN" data-theme="luxury">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>套餐定价 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(184, 134, 11, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body class="min-h-screen text-base-content relative overflow-x-hidden">
    <div class="container mx-auto px-4 py-8 max-w-6xl">

        <!-- Top bar -->
        <div class="mb-12">
            <a href="/" class="btn btn-ghost btn-sm text-base-content/60 hover:text-primary gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                📺 返回监控中心
            </a>
        </div>

        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">
                选择您的 <span class="bg-gradient-to-r from-accent to-primary bg-clip-text text-transparent">套餐</span>
            </h1>
            <p class="text-lg text-base-content/60 max-w-2xl mx-auto">
                按房间数灵活选择，月/季/年付，时间越长折扣越多
            </p>
        </div>




        <!-- Billing Toggle -->
        <div class="flex justify-center mb-12">
            <div class="tabs p-1 bg-base-200/50 rounded-2xl shadow-inner border border-base-content/5"
                id="billingToggle">
                <button class="tab tab-active h-10 px-6 rounded-xl text-sm font-medium transition-all"
                    onclick="setBilling('monthly', this)">月付</button>
                <button class="tab h-10 px-6 rounded-xl text-sm font-medium transition-all"
                    onclick="setBilling('quarterly', this)">
                    季付 <span class="badge badge-accent badge-sm ml-2 font-bold scale-90 -mr-2">省~15%</span>
                </button>
                <button class="tab h-10 px-6 rounded-xl text-sm font-medium transition-all"
                    onclick="setBilling('annual', this)">
                    年付 <span class="badge badge-accent badge-sm ml-2 font-bold scale-90 -mr-2">省~25%</span>
                </button>
            </div>
        </div>

        <!-- Plans Grid -->
        <div id="planGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
            <div class="col-span-full flex justify-center py-10">
                <span class="loading loading-bars loading-lg text-primary"></span>
            </div>
        </div>

        <!-- Addons Section -->
        <div class="mt-8 mb-16 pt-16 border-t border-base-content/10">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-warning" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />
                    </svg>
                    房间数加量包
                </h2>
                <p class="text-base-content/50 mt-2 text-sm">需要更多房间？可独立购买加量包，叠加到当前套餐上</p>
            </div>
            <div id="addonGrid"
                class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-w-5xl mx-auto">
                <div class="col-span-full flex justify-center py-4">
                    <span class="loading loading-dots loading-md text-base-content/30"></span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer footer-center p-8 text-base-content/40 text-xs border-t border-base-content/5 mt-10">
            <div>
                <p>© 2024 TikTok Monitor. 价格均为人民币。购买前请先充值余额。</p>
            </div>
        </footer>
    </div>

    <!-- Alert Modal for messages -->
    <dialog id="messageModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border border-base-content/10">
            <h3 class="font-bold text-lg flex items-center gap-2" id="modalTitle">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-info" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                提示
            </h3>
            <p class="py-4 whitespace-pre-line" id="modalMsg"></p>
            <div class="modal-action">
                <form method="dialog" class="flex gap-2 w-full justify-end">
                    <button class="btn btn-outline" id="modalCancelBtn" style="display:none;">取消</button>
                    <button class="btn btn-primary" id="modalConfirmBtn">确定</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script>
        let billing = 'monthly';
        let plans = [], addons = [], userBalance = 0;
        let resolveModal = null;

        // Custom Async Confirm/Alert function to replace native ones visually
        function showModal(title, msg, isConfirm = false) {
            return new Promise(resolve => {
                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalMsg').innerText = msg;
                const cancelBtn = document.getElementById('modalCancelBtn');
                const confirmBtn = document.getElementById('modalConfirmBtn');

                cancelBtn.style.display = isConfirm ? 'block' : 'none';

                cancelBtn.onclick = () => resolve(false);
                confirmBtn.onclick = () => resolve(true);

                document.getElementById('messageModal').showModal();

                // Also resolve false if user clicks outside backdrop
                document.getElementById('messageModal').addEventListener('close', () => {
                    resolve(false);
                }, { once: true });
            });
        }

        function fmt(c) { return c === 0 ? '免费' : '¥' + (c / 100).toFixed(c % 100 === 0 ? 0 : 2); }

        function setBilling(cycle, btn) {
            billing = cycle;

            // Handle DaisyUI Tab styling
            document.querySelectorAll('#billingToggle .tab').forEach(b => {
                b.classList.remove('tab-active', 'bg-base-100', 'shadow', 'text-primary');
            });
            btn.classList.add('tab-active', 'bg-base-100', 'shadow', 'text-primary');

            renderPlans();
            renderAddons();
        }

        function getPrice(obj) {
            if (billing === 'monthly') return obj.price_monthly || 0;
            if (billing === 'quarterly') return obj.price_quarterly || Math.round((obj.price_monthly || 0) * 3 * 0.85);
            return obj.price_annual || 0;
        }

        function perMonth(price) {
            if (!price || isNaN(price)) return 0;
            if (billing === 'monthly') return price;
            if (billing === 'quarterly') return Math.round(price / 3);
            return Math.round(price / 12);
        }

        function periodLabel() { return ({ monthly: '月', quarterly: '季', annual: '年' })[billing]; }

        function renderPlans() {
            const grid = document.getElementById('planGrid');
            if (!plans.length) { grid.innerHTML = '<div class="col-span-full text-center text-base-content/40 py-10">暂无套餐</div>'; return; }

            grid.innerHTML = plans.map(p => {
                const price = getPrice(p);
                const pm = perMonth(price);
                const isPop = p.code === 'pro';
                const isFree = p.code === 'free';
                const rooms = p.room_limit === -1 ? '无限' : (p.room_limit ?? 0);
                const history = p.history_days === -1 ? '永久' : (p.history_days ?? 0) + '天';
                const ff = p.feature_flags || {};

                return `
                <div class="card bg-base-100/80 backdrop-blur-md shadow-xl border border-white/5 transition-all duration-300 ${isPop ? 'border-primary/50 shadow-primary/20 scale-105 z-10' : 'hover:-translate-y-2 hover:border-white/20 hover:shadow-2xl'}">
                    ${isPop ? '<div class="absolute -top-3 left-1/2 -translate-x-1/2 badge badge-primary font-bold shadow-lg shadow-primary/30 border-none ring-2 ring-base-100 px-3 py-3">🔥 推荐首选</div>' : ''}
                    <div class="card-body">
                        <h2 class="card-title text-xl font-bold opacity-90">${p.name}</h2>
                        
                        <div class="mt-4 mb-6">
                            ${isFree ? '<div class="text-4xl font-extrabold text-white">免费</div>' :
                        `<div class="flex items-baseline">
                                <span class="text-xl text-primary font-bold mr-1">¥</span>
                                <span class="text-5xl font-extrabold text-white tracking-tight">${(pm / 100).toFixed(0)}</span>
                                <span class="text-base-content/50 ml-1 font-medium">/月${billing !== 'monthly' ? ` (${periodLabel()}付)` : ''}</span>
                             </div>
                             ${billing !== 'monthly' ? `<div class="text-xs text-accent mt-2 font-medium bg-accent/10 w-fit px-2 py-1 rounded">${periodLabel()}付共 ${fmt(price)}</div>` : ''}`}
                        </div>
                        
                        <div class="divider my-0 opacity-20"></div>

                        <ul class="space-y-4 my-6 text-sm flex-grow">
                            <li class="flex items-start gap-3">
                                <svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> 
                                <span class="opacity-80">监控房间 <span class="font-bold text-white">${rooms}</span> 间</span>
                            </li>
                            <li class="flex items-start gap-3">
                                <svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> 
                                <span class="opacity-80">历史数据 <span class="font-bold text-white">${history}</span></span>
                            </li>
                            <li class="flex items-start gap-3">
                                <svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> 
                                <span class="opacity-80">AI分析连麦 <span class="font-bold text-white">${p.ai_credits_monthly || 0}</span> 次/月</span>
                            </li>
                            ${ff.export ? '<li class="flex items-start gap-3"><svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> <span class="opacity-80">数据报表导出</span></li>' : ''}
                            ${ff.api_access ? '<li class="flex items-start gap-3"><svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> <span class="opacity-80">开放 API 接口</span></li>' : ''}
                            ${ff.priority_support ? '<li class="flex items-start gap-3"><svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg> <span class="opacity-80 text-warning font-medium">7x24 优先技术支持</span></li>' : ''}
                        </ul>

                        <div class="card-actions mt-auto pt-4">
                            ${isFree
                        ? '<button class="btn btn-outline btn-block text-base-content/50 border-base-content/20" disabled>当前为基础方案</button>'
                        : `<button class="btn ${isPop ? 'btn-primary shadow-lg shadow-primary/30' : 'btn-accent text-base-100 shadow-lg shadow-accent/20'} btn-block hover:scale-[1.02] transition-transform font-bold" onclick="buyPlan('${p.code}')">
                                    ${userBalance >= price ? '立即使用余额购买' : '余额不足 · 去充值'}</button>`}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderAddons() {
            const grid = document.getElementById('addonGrid');
            if (!addons.length) { grid.innerHTML = '<div class="col-span-full text-center text-base-content/40">暂无包月加量选项</div>'; return; }

            grid.innerHTML = addons.map(a => {
                const price = getPrice(a);
                return `
                <div class="card bg-base-200/40 backdrop-blur-sm border border-base-content/10 hover:border-accent/50 hover:bg-base-200/80 transition-all duration-300">
                    <div class="card-body text-center p-6 flex flex-col items-center">
                        <div class="w-16 h-16 rounded-full bg-accent/10 flex items-center justify-center mb-3 text-accent transition-colors">
                            <span class="text-2xl font-black">+${a.room_count}</span>
                        </div>
                        <h3 class="font-bold text-lg mb-1">${a.name}</h3>
                        <div class="text-sm font-medium opacity-60 mb-5 bg-base-300/50 px-3 py-1 rounded-full">${fmt(price)} / ${periodLabel()}</div>
                        <button class="btn btn-sm btn-outline btn-block mt-auto hover:bg-accent hover:text-base-100 hover:border-accent" onclick="buyAddon(${a.id})">${userBalance >= price ? '余额购买' : '余额充值'}</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function loadPlans() {
            try {
                const token = localStorage.getItem('accessToken');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const res = await fetch('/api/subscription/plans', { headers });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                plans = data.plans || [];
                addons = data.addons || [];
                userBalance = data.balance || 0;

                if (token) {
                    const bar = document.getElementById('balanceBar');
                    bar.classList.remove('hidden');
                    document.getElementById('currentBalance').textContent = fmt(userBalance);
                }

                renderPlans();
                renderAddons();
            } catch (err) {
                document.getElementById('planGrid').innerHTML = `<div class="col-span-full text-center text-error p-8 bg-error/10 rounded-xl">加载失败: ${err.message}</div>`;
            }
        }

        async function buyPlan(code) {
            const token = localStorage.getItem('accessToken');
            if (!token) { window.location.href = 'login.html'; return; }

            const plan = plans.find(p => p.code === code);
            const price = getPrice(plan);

            if (userBalance < price) {
                if (await showModal('余额不足', `需要 ${fmt(price)}\n当前 ${fmt(userBalance)}\n\n是否前往充值？`, true)) {
                    window.location.href = 'user-center.html';
                }
                return;
            }

            const cycleNames = { monthly: '月付', quarterly: '季付', annual: '年付' };
            const confirmed = await showModal('确认购买', `确认使用余额购买【${plan.name}】（${cycleNames[billing]}）？\n\n预计扣款: ${fmt(price)}`, true);
            if (!confirmed) return;

            try {
                // Wait visual effect
                document.querySelectorAll('button').forEach(b => b.classList.add('cursor-wait'));

                const res = await fetch('/api/subscription/purchase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ planCode: code, billingCycle: billing })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                await showModal('支付成功', data.message + `\n\n剩余余额: ${fmt(data.newBalance)}`);
                userBalance = data.newBalance;
                document.getElementById('currentBalance').textContent = fmt(userBalance);
                renderPlans();
            } catch (err) {
                showModal('购买受阻', err.message);
            } finally {
                document.querySelectorAll('button').forEach(b => b.classList.remove('cursor-wait'));
            }
        }

        async function buyAddon(pkgId) {
            const token = localStorage.getItem('accessToken');
            if (!token) { window.location.href = 'login.html'; return; }

            const addon = addons.find(a => a.id === pkgId);
            const price = getPrice(addon);

            if (userBalance < price) {
                if (await showModal('余额不足', `需要 ${fmt(price)}\n当前 ${fmt(userBalance)}\n\n是否前往充值？`, true)) {
                    window.location.href = 'user-center.html';
                }
                return;
            }

            const cycleNames = { monthly: '月付', quarterly: '季付', annual: '年付' };
            const confirmed = await showModal('确认加购', `确认加购【${addon.name}】（${cycleNames[billing]}）？\n\n预计扣款: ${fmt(price)}`, true);
            if (!confirmed) return;

            try {
                const res = await fetch('/api/subscription/addon/purchase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ packageId: pkgId, billingCycle: billing })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                await showModal('支付成功', data.message + `\n\n剩余余额: ${fmt(data.newBalance)}`);
                userBalance = data.newBalance;
                document.getElementById('currentBalance').textContent = fmt(userBalance);
                renderAddons();
            } catch (err) {
                showModal('加购受阻', err.message);
            }
        }

        // Initialize Tab styling
        document.querySelector('#billingToggle .tab-active').click();

        loadPlans();
    </script>
</body>

</html>
