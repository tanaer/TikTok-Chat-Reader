<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>套餐定价 - TikTok Monitor</title>
    <link rel="stylesheet" href="landing.css">
    <style>
        .pricing-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .pricing-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .pricing-header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }

        .pricing-header h1 span {
            background: linear-gradient(135deg, #00f5d4, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .pricing-header p {
            color: rgba(255, 255, 255, 0.5);
        }

        .balance-bar {
            text-align: center;
            margin-bottom: 24px;
            padding: 14px;
            background: rgba(0, 245, 212, 0.06);
            border: 1px solid rgba(0, 245, 212, 0.15);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .balance-bar strong {
            color: #00f5d4;
            font-size: 1.1rem;
        }

        .billing-toggle {
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 4px;
            width: fit-content;
            margin: 0 auto 36px;
        }

        .billing-toggle button {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .billing-toggle button.active {
            background: linear-gradient(135deg, #7b2cbf, #5b21b6);
            color: white;
            box-shadow: 0 4px 12px rgba(123, 44, 191, 0.3);
        }

        .save-badge {
            display: inline-block;
            background: rgba(0, 245, 212, 0.2);
            color: #00f5d4;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            margin-left: 4px;
        }

        .plan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 18px;
            margin-bottom: 48px;
        }

        .plan-card {
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 26px;
            position: relative;
            transition: all 0.3s;
        }

        .plan-card:hover {
            transform: translateY(-3px);
            border-color: rgba(123, 44, 191, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .plan-card.popular {
            border-color: rgba(123, 44, 191, 0.4);
        }

        .plan-card.popular::before {
            content: '🔥 推荐';
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #7b2cbf, #5b21b6);
            color: white;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .plan-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: white;
            margin-bottom: 2px;
        }

        .plan-price {
            margin: 16px 0;
        }

        .plan-price .amount {
            font-size: 2.25rem;
            font-weight: 800;
            color: white;
        }

        .plan-price .currency {
            font-size: 1.1rem;
            vertical-align: super;
            color: #00f5d4;
        }

        .plan-price .period {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
        }

        .plan-price .total-hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .plan-features {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }

        .plan-features li {
            padding: 5px 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .plan-features li .ck {
            color: #00f5d4;
        }

        .addon-section {
            margin-bottom: 48px;
        }

        .addon-section h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 6px;
        }

        .addon-section .desc {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .addon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            max-width: 700px;
            margin: 0 auto;
        }

        .addon-card {
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 22px;
            text-align: center;
            transition: all 0.3s;
        }

        .addon-card:hover {
            border-color: rgba(0, 245, 212, 0.3);
            transform: translateY(-2px);
        }

        .addon-rooms {
            font-size: 1.75rem;
            font-weight: 800;
            color: #00f5d4;
        }

        .addon-name {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            margin: 4px 0 8px;
        }

        .addon-price {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .back-bar {
            padding: 16px 0;
        }

        .landing-footer {
            text-align: center;
            padding: 32px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            .pricing-header h1 {
                font-size: 1.5rem;
            }

            .plan-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="pricing-container">
        <div class="back-bar"><a href="/" style="color:rgba(255,255,255,0.5);font-size:0.85rem;">← 返回控制台</a></div>

        <div class="pricing-header">
            <h1>选择您的<span>套餐</span></h1>
            <p>按房间数灵活选择，月/季/年付，时间越长折扣越多</p>
        </div>

        <div id="balanceBar" class="balance-bar" style="display:none;">
            当前余额: <strong id="currentBalance">¥0</strong>
            <a href="user-center.html" style="margin-left:12px;color:#00f5d4;font-size:0.85rem;">去充值 →</a>
        </div>

        <div class="billing-toggle">
            <button class="active" onclick="setBilling('monthly',this)">月付</button>
            <button onclick="setBilling('quarterly',this)">季付 <span class="save-badge">省~15%</span></button>
            <button onclick="setBilling('annual',this)">年付 <span class="save-badge">省~25%</span></button>
        </div>

        <div id="planGrid" class="plan-grid">
            <div style="text-align:center;color:rgba(255,255,255,0.4);grid-column:1/-1;padding:40px;">加载中...</div>
        </div>

        <div class="addon-section">
            <h2>🧩 房间数加量包</h2>
            <p class="desc">需要更多房间？可独立购买加量包，叠加到当前套餐上</p>
            <div id="addonGrid" class="addon-grid">
                <div style="text-align:center;color:rgba(255,255,255,0.4);grid-column:1/-1;">加载中...</div>
            </div>
        </div>

        <div class="landing-footer">© 2024 TikTok Monitor. 价格均为人民币。购买前请先充值余额。</div>
    </div>

    <script>
        let billing = 'monthly';
        let plans = [], addons = [], userBalance = 0;

        function fmt(c) { return c === 0 ? '免费' : '¥' + (c / 100).toFixed(c % 100 === 0 ? 0 : 2); }

        function setBilling(cycle, btn) {
            billing = cycle;
            document.querySelectorAll('.billing-toggle button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPlans();
            renderAddons();
        }

        function getPrice(obj) {
            if (billing === 'monthly') return obj.price_monthly;
            if (billing === 'quarterly') return obj.price_quarterly;
            return obj.price_annual;
        }

        function perMonth(price) {
            if (billing === 'monthly') return price;
            if (billing === 'quarterly') return Math.round(price / 3);
            return Math.round(price / 12);
        }

        function periodLabel() { return ({ monthly: '月', quarterly: '季', annual: '年' })[billing]; }

        function renderPlans() {
            const grid = document.getElementById('planGrid');
            if (!plans.length) { grid.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);grid-column:1/-1;">暂无套餐</div>'; return; }

            grid.innerHTML = plans.map(p => {
                const price = getPrice(p);
                const pm = perMonth(price);
                const isPop = p.code === 'pro';
                const isFree = p.code === 'free';
                const rooms = p.room_limit === -1 ? '无限' : p.room_limit;
                const history = p.history_days === -1 ? '永久' : p.history_days + '天';
                const ff = p.feature_flags || {};

                return `<div class="plan-card${isPop ? ' popular' : ''}">
                    <div class="plan-name">${p.name}</div>
                    <div class="plan-price">
                        ${isFree ? '<div class="amount">免费</div>' :
                        `<div class="amount"><span class="currency">¥</span>${(pm / 100).toFixed(0)}</div>
                             <div class="period">/月${billing !== 'monthly' ? ` (${periodLabel()}付)` : ''}</div>
                             ${billing !== 'monthly' ? `<div class="total-hint">${periodLabel()}付共 ${fmt(price)}</div>` : ''}`}
                    </div>
                    <ul class="plan-features">
                        <li><span class="ck">✓</span> 监控房间 ${rooms}间</li>
                        <li><span class="ck">✓</span> 历史数据 ${history}</li>
                        <li><span class="ck">✓</span> AI分析 ${p.ai_credits_monthly || 0}次/月</li>
                        ${ff.export ? '<li><span class="ck">✓</span> 数据导出</li>' : ''}
                        ${ff.api_access ? '<li><span class="ck">✓</span> API接口</li>' : ''}
                        ${ff.priority_support ? '<li><span class="ck">✓</span> 优先支持</li>' : ''}
                    </ul>
                    ${isFree
                        ? '<button class="btn btn-outline btn-block btn-sm" disabled>当前方案</button>'
                        : `<button class="btn ${isPop ? 'btn-primary' : 'btn-accent'} btn-block btn-sm" onclick="buyPlan('${p.code}')">
                            ${userBalance >= price ? '余额购买' : '余额不足 · 去充值'}</button>`}
                </div>`;
            }).join('');
        }

        function renderAddons() {
            const grid = document.getElementById('addonGrid');
            if (!addons.length) { grid.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);grid-column:1/-1;">暂无</div>'; return; }

            grid.innerHTML = addons.map(a => {
                const price = getPrice(a);
                return `<div class="addon-card">
                    <div class="addon-rooms">+${a.room_count}</div>
                    <div class="addon-name">${a.name}</div>
                    <div class="addon-price">${fmt(price)}/${periodLabel()}</div>
                    <button class="btn btn-outline btn-sm btn-block" onclick="buyAddon(${a.id})">${userBalance >= price ? '余额购买' : '余额不足'}</button>
                </div>`;
            }).join('');
        }

        async function loadPlans() {
            try {
                const token = localStorage.getItem('accessToken');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const res = await fetch('/api/subscription/plans', { headers });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                plans = data.plans || [];
                addons = data.addons || [];
                userBalance = data.balance || 0;

                if (token) {
                    document.getElementById('balanceBar').style.display = 'block';
                    document.getElementById('currentBalance').textContent = fmt(userBalance);
                }

                renderPlans();
                renderAddons();
            } catch (err) {
                document.getElementById('planGrid').innerHTML = `<div style="text-align:center;color:#ff6b6b;grid-column:1/-1;">加载失败: ${err.message}</div>`;
            }
        }

        async function buyPlan(code) {
            const token = localStorage.getItem('accessToken');
            if (!token) { window.location.href = 'login.html'; return; }

            const plan = plans.find(p => p.code === code);
            const price = getPrice(plan);

            if (userBalance < price) {
                if (confirm(`余额不足（需要 ${fmt(price)}，当前 ${fmt(userBalance)}）。\n是否前往充值？`)) {
                    window.location.href = 'user-center.html';
                }
                return;
            }

            const cycleNames = { monthly: '月付', quarterly: '季付', annual: '年付' };
            if (!confirm(`确认使用余额购买 ${plan.name}（${cycleNames[billing]}）？\n扣款: ${fmt(price)}`)) return;

            try {
                const res = await fetch('/api/subscription/purchase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ planCode: code, billingCycle: billing })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                alert(data.message + `\n剩余余额: ${fmt(data.newBalance)}`);
                userBalance = data.newBalance;
                document.getElementById('currentBalance').textContent = fmt(userBalance);
                renderPlans();
            } catch (err) { alert(err.message); }
        }

        async function buyAddon(pkgId) {
            const token = localStorage.getItem('accessToken');
            if (!token) { window.location.href = 'login.html'; return; }

            const addon = addons.find(a => a.id === pkgId);
            const price = getPrice(addon);

            if (userBalance < price) {
                if (confirm(`余额不足。是否前往充值？`)) window.location.href = 'user-center.html';
                return;
            }

            const cycleNames = { monthly: '月付', quarterly: '季付', annual: '年付' };
            if (!confirm(`确认购买 ${addon.name}（${cycleNames[billing]}）？\n扣款: ${fmt(price)}`)) return;

            try {
                const res = await fetch('/api/subscription/addon/purchase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ packageId: pkgId, billingCycle: billing })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                alert(data.message + `\n剩余余额: ${fmt(data.newBalance)}`);
                userBalance = data.newBalance;
                document.getElementById('currentBalance').textContent = fmt(userBalance);
                renderAddons();
            } catch (err) { alert(err.message); }
        }

        loadPlans();
    </script>
</body>

</html>
