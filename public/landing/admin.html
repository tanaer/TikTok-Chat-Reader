<!DOCTYPE html>
<html lang="zh-CN" data-theme="dracula">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 80% 20%, rgba(123, 44, 191, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(0, 245, 212, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="min-h-screen text-base-content relative">
    <div class="max-w-[1400px] mx-auto px-4 py-8">

        <!-- Top bar -->
        <div
            class="navbar bg-base-100/60 backdrop-blur-md rounded-2xl shadow-sm border border-base-content/5 mb-8 px-6">
            <div class="flex-1">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <span class="text-primary text-2xl">⚙️</span>
                    管理后台
                </h1>
            </div>
            <div class="flex-none gap-2 hidden sm:flex">
                <a href="/" class="btn btn-ghost btn-sm hover:text-primary transition-colors">控制台</a>
                <a href="user-center.html" class="btn btn-ghost btn-sm hover:text-primary transition-colors">用户中心</a>
                <button onclick="doLogout()" class="btn btn-ghost btn-sm text-error hover:bg-error/20">退出</button>
            </div>
            <!-- Mobile Menu -->
            <div class="flex-none sm:hidden dropdown dropdown-end">
                <label tabindex="0" class="btn btn-ghost btn-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </label>
                <ul tabindex="0"
                    class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52 border border-base-content/10">
                    <li><a href="/">控制台</a></li>
                    <li><a href="user-center.html">用户中心</a></li>
                    <li><a onclick="doLogout()" class="text-error">退出</a></li>
                </ul>
            </div>
        </div>

        <div id="alertBox" class="alert shadow-lg mb-6 hidden font-medium transition-all"></div>

        <!-- System Stats -->
        <div
            class="stats stats-vertical sm:stats-horizontal shadow-xl bg-base-100/60 backdrop-blur-md border border-white/5 w-full mb-8">
            <div class="stat place-items-center">
                <div class="stat-title opacity-70">总用户数</div>
                <div class="stat-value text-3xl" id="statUsers">-</div>
            </div>
            <div class="stat place-items-center">
                <div class="stat-title opacity-70">总房间数</div>
                <div class="stat-value text-3xl text-primary" id="statRooms">-</div>
            </div>
            <div class="stat place-items-center">
                <div class="stat-title opacity-70">活跃房间</div>
                <div class="stat-value text-3xl text-secondary" id="statActive">-</div>
            </div>
            <div class="stat place-items-center">
                <div class="stat-title opacity-70">总订单数</div>
                <div class="stat-value text-3xl" id="statOrders">-</div>
            </div>
            <div class="stat place-items-center">
                <div class="stat-title opacity-70">总收入</div>
                <div class="stat-value text-3xl text-accent" id="statRevenue">-</div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="card bg-base-100/70 backdrop-blur-md shadow-xl border border-white/5 min-h-[600px]">
            <div class="card-body p-0">
                <!-- Tabs -->
                <div role="tablist" class="tabs tabs-bordered grid-cols-2 lg:grid-cols-4 px-6 pt-6">
                    <input type="radio" name="admin_tabs" role="tab" class="tab text-lg h-12 font-bold"
                        aria-label="👥 用户管理" id="tabUsers" checked onchange="switchTab('users')" />
                    <input type="radio" name="admin_tabs" role="tab" class="tab text-lg h-12 font-bold"
                        aria-label="📋 订单管理" id="tabOrders" onchange="switchTab('orders')" />
                </div>

                <div class="p-6">
                    <!-- Users Tab Content -->
                    <div id="content-users" class="space-y-4">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <div class="join">
                                <input class="input input-sm input-bordered join-item w-64 bg-base-200/50"
                                    id="userSearch" placeholder="搜索邮箱/昵称..."
                                    onkeydown="if(event.key==='Enter')loadUsers()" />
                                <button class="btn btn-sm btn-primary join-item" onclick="loadUsers()">搜索</button>
                            </div>
                        </div>

                        <div class="overflow-x-auto custom-scrollbar border border-base-content/10 rounded-xl mt-4">
                            <table class="table table-zebra table-sm whitespace-nowrap">
                                <thead class="bg-base-200/50">
                                    <tr class="text-base-content/70">
                                        <th class="w-16">ID</th>
                                        <th>邮箱</th>
                                        <th>昵称</th>
                                        <th>角色</th>
                                        <th>余额</th>
                                        <th>套餐</th>
                                        <th>房间配额</th>
                                        <th>状态</th>
                                        <th>注册时间</th>
                                        <th class="w-20 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody">
                                    <tr>
                                        <td colspan="10" class="text-center py-10 opacity-50"><span
                                                class="loading loading-spinner"></span></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="flex justify-center w-full mt-4" id="userPagination"></div>
                    </div>

                    <!-- Orders Tab Content -->
                    <div id="content-orders" class="space-y-4 hidden">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <div class="join">
                                <input class="input input-sm input-bordered join-item w-56 bg-base-200/50"
                                    id="orderSearch" placeholder="搜索订单号/邮箱..."
                                    onkeydown="if(event.key==='Enter')loadOrders()" />
                                <select class="select select-sm select-bordered join-item bg-base-200/50"
                                    id="orderStatus" onchange="loadOrders()">
                                    <option value="">全部状态</option>
                                    <option value="paid">已支付</option>
                                    <option value="pending">待支付</option>
                                    <option value="failed">失败</option>
                                    <option value="refunded">已退款</option>
                                </select>
                                <button class="btn btn-sm btn-primary join-item" onclick="loadOrders()">搜索</button>
                            </div>
                        </div>

                        <div class="overflow-x-auto custom-scrollbar border border-base-content/10 rounded-xl mt-4">
                            <table class="table table-zebra table-sm whitespace-nowrap">
                                <thead class="bg-base-200/50">
                                    <tr class="text-base-content/70">
                                        <th>订单号</th>
                                        <th>用户</th>
                                        <th>金额</th>
                                        <th>支付方式</th>
                                        <th>状态</th>
                                        <th>创建时间</th>
                                        <th class="w-24 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="orderTableBody">
                                    <tr>
                                        <td colspan="7" class="text-center py-10 opacity-50"><span
                                                class="loading loading-spinner"></span></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="flex justify-center w-full mt-4" id="orderPagination"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- User Edit Modal -->
    <dialog id="userModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border border-base-content/10 max-w-lg">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-xl mb-6 flex items-center gap-2" id="modalTitle">
                <span class="text-primary">✏️</span> <span>编辑用户</span>
            </h3>

            <input type="hidden" id="modalUserId">

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">角色权限</span></label>
                    <select id="modalRole" class="select select-bordered select-sm w-full bg-base-200/50">
                        <option value="user">普通用户</option>
                        <option value="admin">系统管理员</option>
                    </select>
                </div>
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">账号状态</span></label>
                    <select id="modalStatus" class="select select-bordered select-sm w-full bg-base-200/50">
                        <option value="active">正常</option>
                        <option value="suspended" class="text-error">停用</option>
                    </select>
                </div>
            </div>

            <div class="divider text-xs opacity-50">余额与额度调整</div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">调整余额 (元)</span><span
                            class="label-text-alt text-info">正加负减</span></label>
                    <input type="number" id="modalBalanceAdj" placeholder="留空不改" step="0.01"
                        class="input input-sm input-bordered w-full bg-base-200/50 font-mono">
                </div>
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">调整原因</span></label>
                    <input type="text" id="modalBalanceReason" placeholder="管理员后台手动调整"
                        class="input input-sm input-bordered w-full bg-base-200/50">
                </div>
            </div>

            <div class="divider text-xs opacity-50">套餐分发</div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">设置套餐</span></label>
                    <select id="modalPlan" class="select select-bordered select-sm w-full bg-base-200/50">
                        <option value="">(不修改)</option>
                    </select>
                </div>
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">有效天数</span></label>
                    <input type="number" id="modalPlanDays" value="30" min="1"
                        class="input input-sm input-bordered w-full bg-base-200/50">
                </div>
            </div>

            <div class="divider text-xs opacity-50">安全管理</div>

            <div class="form-control w-full mb-6">
                <label class="label"><span class="label-text">强制重置密码</span></label>
                <input type="text" id="modalNewPwd" placeholder="留空则不修改（至少6位）"
                    class="input input-sm input-bordered w-full bg-base-200/50 font-mono">
            </div>

            <div class="modal-action">
                <form method="dialog" class="flex gap-2 w-full justify-end">
                    <button class="btn btn-outline btn-sm px-6">取消</button>
                    <button class="btn btn-primary btn-sm px-8 shadow-sm" type="button"
                        onclick="saveUser()">保存所有修改</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <!-- General Message Modal -->
    <dialog id="messageModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border border-base-content/10">
            <h3 class="font-bold text-lg flex items-center gap-2" id="msgModalTitle">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-info" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                提示
            </h3>
            <p class="py-4 whitespace-pre-line" id="msgModalMsg"></p>
            <div class="modal-action">
                <form method="dialog" class="flex gap-2 w-full justify-end">
                    <button class="btn btn-outline" id="msgModalCancelBtn" style="display:none;">取消</button>
                    <button class="btn btn-primary" id="msgModalConfirmBtn">确定</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <div id="toastContainer" class="toast toast-top toast-center z-50 mt-4 transition-all"></div>

    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) { window.location.href = 'login.html'; }

        let userPage = 1, orderPage = 1;

        // Custom UI utilities
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} shadow-lg mb-2 animate-bounce flex items-center gap-2`;
            if (type === 'error') {
                alert.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> <span>${msg}</span>`;
            } else {
                alert.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> <span>${msg}</span>`;
            }
            container.appendChild(alert);
            setTimeout(() => {
                alert.classList.replace('animate-bounce', 'opacity-0');
                setTimeout(() => alert.remove(), 300);
            }, 3000);
        }

        function showMessageModal(title, msg, isConfirm = false, isError = false) {
            return new Promise(resolve => {
                const titleIcon = document.querySelector('#msgModalTitle svg');
                if (isError) {
                    titleIcon.classList.replace('text-info', 'text-error');
                    titleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />';
                } else {
                    titleIcon.classList.replace('text-error', 'text-info');
                    titleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />';
                }

                document.getElementById('msgModalTitle').innerHTML = titleIcon.outerHTML + `<span>${title}</span>`;
                document.getElementById('msgModalMsg').innerText = msg;
                const cancelBtn = document.getElementById('msgModalCancelBtn');
                const confirmBtn = document.getElementById('msgModalConfirmBtn');

                cancelBtn.style.display = isConfirm ? 'block' : 'none';
                cancelBtn.onclick = () => resolve(false);
                confirmBtn.onclick = () => resolve(true);

                document.getElementById('messageModal').showModal();
                document.getElementById('messageModal').addEventListener('close', () => resolve(false), { once: true });
            });
        }

        function fmt(cents) { return cents === 0 ? '¥0' : '¥' + (cents / 100).toFixed(cents % 100 === 0 ? 0 : 2); }
        function fmtDate(d) { return d ? new Date(d).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric' }) : '-'; }

        const badgeClasses = {
            paid: 'badge-success', pending: 'badge-warning', failed: 'badge-error', refunded: 'badge-ghost',
            active: 'badge-success', suspended: 'badge-error',
            admin: 'badge-primary', user: 'badge-ghost'
        };
        const statusNames = {
            paid: '已支付', pending: '待支付', failed: '充值失败', refunded: '已退款',
            active: '正常', suspended: '已停用',
            admin: '管理员', user: '用户'
        };
        const statusBadge = s => `<span class="badge ${badgeClasses[s] || 'badge-ghost'} badge-sm font-medium border-base-content/10 shadow-sm">${statusNames[s] || s}</span>`;

        async function apiFetch(url, opts = {}) {
            const res = await fetch(url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers } });
            if (res.status === 401) { window.location.href = 'login.html'; }
            if (res.status === 403) {
                await showMessageModal('权限拒绝', '无管理员权限访问该页面', false, true);
                window.location.href = '/';
            }
            return res;
        }

        function switchTab(name) {
            document.getElementById('content-users').classList.add('hidden');
            document.getElementById('content-orders').classList.add('hidden');
            document.getElementById('content-' + name).classList.remove('hidden');
            if (name === 'orders' && !document.getElementById('orderTableBody').hasChildNodes()) {
                loadOrders(); // load only once lazily mostly handled by init anyway
            } else if (name === 'orders') {
                loadOrders();
            }
        }

        // ---- Stats ----
        async function loadStats() {
            try {
                const res = await apiFetch('/api/admin/stats');
                const d = await res.json();
                document.getElementById('statUsers').textContent = d.totalUsers;
                document.getElementById('statRooms').textContent = d.totalRooms;
                document.getElementById('statActive').textContent = d.activeRooms;
                document.getElementById('statOrders').textContent = d.totalOrders;
                document.getElementById('statRevenue').textContent = fmt(d.totalRevenue);
            } catch { } // fail silently for metrics
        }

        // ---- Users ----
        async function loadUsers() {
            try {
                const search = document.getElementById('userSearch').value;
                document.getElementById('userTableBody').innerHTML = '<tr><td colspan="10" class="text-center py-10 opacity-50"><span class="loading loading-spinner"></span></td></tr>';
                const res = await apiFetch(`/api/admin/users?page=${userPage}&limit=10&search=${encodeURIComponent(search)}`);
                const d = await res.json();

                const tbody = document.getElementById('userTableBody');
                if (!d.data || d.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" class="text-center py-8 opacity-40">未找到符合条件的用户</td></tr>';
                } else {
                    tbody.innerHTML = d.data.map(u => `
                    <tr class="hover">
                        <td class="font-mono text-xs opacity-60">${u.id}</td>
                        <td class="font-medium">${u.email}</td>
                        <td>${u.nickname || '<span class="opacity-30">-</span>'}</td>
                        <td>${statusBadge(u.role)}</td>
                        <td class="font-mono text-success font-semibold">${fmt(u.balance || 0)}</td>
                        <td>${u.plan_name || '免费版'}</td>
                        <td class="font-mono">${u.room_count || 0}</td>
                        <td>${statusBadge(u.status)}</td>
                        <td class="text-xs opacity-60">${fmtDate(u.created_at)}</td>
                        <td class="text-center">
                            <button class="btn btn-ghost btn-xs text-info hover:bg-info/20" onclick="editUser(${u.id},'${u.role}','${u.status}')">管理</button>
                        </td>
                    </tr>`).join('');
                }

                renderPagination('userPagination', d.pagination, p => { userPage = p; loadUsers(); });
            } catch (err) {
                showToast('加载用户列表失败', 'error');
            }
        }

        function editUser(id, role, status) {
            document.getElementById('modalUserId').value = id;
            document.getElementById('modalRole').value = role;
            document.getElementById('modalStatus').value = status;
            document.getElementById('modalBalanceAdj').value = '';
            document.getElementById('modalBalanceReason').value = '';
            document.getElementById('modalNewPwd').value = '';
            document.getElementById('modalPlan').value = '';
            document.getElementById('modalPlanDays').value = 30;

            document.querySelector('#modalTitle span:last-child').textContent = `编辑用户 (${id})`;
            document.getElementById('userModal').showModal();
        }

        async function saveUser() {
            const id = document.getElementById('modalUserId').value;
            const modal = document.getElementById('userModal');
            try {
                // 1. Update role/status
                await apiFetch(`/api/admin/users/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        role: document.getElementById('modalRole').value,
                        status: document.getElementById('modalStatus').value
                    })
                });

                // 2. Adjust balance if specified
                const adjYuan = parseFloat(document.getElementById('modalBalanceAdj').value);
                if (adjYuan && adjYuan !== 0) {
                    const adjCents = Math.round(adjYuan * 100);
                    const reason = document.getElementById('modalBalanceReason').value || '管理员后台手动调整';
                    await apiFetch(`/api/admin/users/${id}/adjust-balance`, {
                        method: 'POST',
                        body: JSON.stringify({ amount: adjCents, reason })
                    });
                }

                // 3. Reset password if specified
                const newPwd = document.getElementById('modalNewPwd').value.trim();
                if (newPwd) {
                    const r = await apiFetch(`/api/admin/users/${id}/reset-password`, {
                        method: 'POST',
                        body: JSON.stringify({ newPassword: newPwd })
                    });
                    const d = await r.json();
                    if (!r.ok) throw new Error(d.error);
                }

                // 4. Set subscription if specified
                const planCode = document.getElementById('modalPlan').value;
                if (planCode) {
                    await apiFetch(`/api/admin/users/${id}/set-subscription`, {
                        method: 'POST',
                        body: JSON.stringify({ planCode, durationDays: parseInt(document.getElementById('modalPlanDays').value) || 30 })
                    });
                }

                modal.close();
                showToast('用户信息更新成功', 'success');
                loadUsers();
                loadStats();
            } catch (err) {
                showToast('保存失败: ' + err.message, 'error');
            }
        }

        // ---- Orders ----
        async function loadOrders() {
            try {
                const search = document.getElementById('orderSearch').value;
                const status = document.getElementById('orderStatus').value;
                document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="7" class="text-center py-10 opacity-50"><span class="loading loading-spinner"></span></td></tr>';
                const res = await apiFetch(`/api/admin/orders?page=${orderPage}&limit=10&search=${encodeURIComponent(search)}&status=${status}`);
                const d = await res.json();

                const tbody = document.getElementById('orderTableBody');
                if (!d.data || d.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 opacity-40">未找到相关订单</td></tr>';
                } else {
                    tbody.innerHTML = d.data.map(o => `
                    <tr class="hover">
                        <td class="font-mono text-xs opacity-60">${o.order_no}</td>
                        <td class="font-medium">${o.user_email || '<span class="opacity-30">-</span>'}</td>
                        <td class="font-semibold">${fmt(o.amount)}</td>
                        <td><div class="badge badge-outline badge-sm capitalize border-base-content/20">${o.payment_method || '-'}</div></td>
                        <td>${statusBadge(o.status)}</td>
                        <td class="text-xs opacity-60">${fmtDate(o.created_at)}</td>
                        <td class="text-center">
                            ${o.status === 'pending' ? `<button class="btn btn-ghost btn-xs text-success hover:bg-success/20" onclick="updateOrderStatus(${o.id},'paid')">补单(标为已付)</button>` : '<span class="opacity-20 text-xs">-</span>'}
                        </td>
                    </tr>`).join('');
                }

                renderPagination('orderPagination', d.pagination, p => { orderPage = p; loadOrders(); });
            } catch (err) {
                showToast('加载订单列表失败', 'error');
            }
        }

        async function updateOrderStatus(id, status) {
            const confirmed = await showMessageModal('补单确认', `确认将此订单强制标记为"已支付"并下发相应商品权益吗？\n此操作一般用于用户付款成功但系统未收到回调的情况。`, true, true);
            if (!confirmed) return;
            try {
                await apiFetch(`/api/admin/orders/${id}`, { method: 'PUT', body: JSON.stringify({ status }) });
                showToast('订单补发成功', 'success');
                loadOrders();
                loadStats();
            } catch (err) { showToast(err.message, 'error'); }
        }

        // ---- Pagination helper (DaisyUI join) ----
        function renderPagination(elemId, pg, onClick) {
            if (!pg || pg.totalPages <= 1) { document.getElementById(elemId).innerHTML = ''; return; }
            let html = '<div class="join shadow-sm border border-base-content/10 bg-base-100">';
            html += `<button class="join-item btn btn-sm ${pg.page <= 1 ? 'btn-disabled opacity-30' : ''}" data-act="prev">«</button>`;

            // max pages to show = 5
            let start = Math.max(1, pg.page - 2);
            let end = Math.min(pg.totalPages, pg.page + 2);
            if (end - start < 4) {
                if (start === 1) end = Math.min(pg.totalPages, 5);
                else start = Math.max(1, pg.totalPages - 4);
            }

            if (start > 1) {
                html += `<button class="join-item btn btn-sm" data-act="1">1</button>`;
                if (start > 2) html += `<button class="join-item btn btn-sm btn-disabled">...</button>`;
            }

            for (let i = start; i <= end; i++) {
                html += `<button class="join-item btn btn-sm ${i === pg.page ? 'btn-active border-primary/20' : ''}" data-act="${i}">${i}</button>`;
            }

            if (end < pg.totalPages) {
                if (end < pg.totalPages - 1) html += `<button class="join-item btn btn-sm btn-disabled">...</button>`;
                html += `<button class="join-item btn btn-sm" data-act="${pg.totalPages}">${pg.totalPages}</button>`;
            }

            html += `<button class="join-item btn btn-sm ${pg.page >= pg.totalPages ? 'btn-disabled opacity-30' : ''}" data-act="next">»</button>`;
            html += '</div>';

            const div = document.getElementById(elemId);
            div.innerHTML = html;
            div.querySelectorAll('button[data-act]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const act = btn.getAttribute('data-act');
                    if (act === 'prev') onClick(pg.page - 1);
                    else if (act === 'next') onClick(pg.page + 1);
                    else if (!isNaN(parseInt(act))) onClick(parseInt(act));
                });
            });
        }

        // ---- Load plans for the modal dropdown ----
        async function loadPlans() {
            try {
                const res = await apiFetch('/api/admin/plans');
                const plans = await res.json();
                const select = document.getElementById('modalPlan');
                plans.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.code;
                    opt.textContent = `${p.name} (${p.room_limit === -1 ? '无限配额' : p.room_limit + '间'})`;
                    select.appendChild(opt);
                });
            } catch { } // fail silently
        }

        function doLogout() {
            showMessageModal('退出登录', '确定要退出管理账号吗？', true).then(confirmed => {
                if (confirmed) {
                    const rt = localStorage.getItem('refreshToken');
                    fetch('/api/auth/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken: rt }) }).catch(() => null);
                    localStorage.removeItem('accessToken');
                    localStorage.removeItem('refreshToken');
                    window.location.href = 'login.html';
                }
            });
        }

        // Init Flow
        loadStats();
        loadUsers();
        loadPlans();
    </script>
</body>

</html>
