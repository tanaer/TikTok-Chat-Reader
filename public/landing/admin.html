<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-nav-active="admin">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/auth.js"></script>
    <script src="/nav_shared.js"></script>
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 1.5rem;
            min-height: calc(100vh - 3.5rem);
            align-items: start;
        }

        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }

            .admin-sidebar {
                display: none;
            }
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInUp 0.3s ease both;
        }

        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 1rem;
            border-radius: 0.625rem;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0.5;
            transition: all 0.2s;
            width: 100%;
            text-align: left;
        }

        .sidebar-btn:hover {
            opacity: 0.8;
            background: var(--glass-bg);
        }

        .sidebar-btn.active {
            opacity: 1;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
        }

        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
    </style>
</head>

<body class="page-bg">
    <div id="app-navbar"></div>

    <div class="max-w-[1400px] mx-auto px-4 py-6">

        <!-- Alert -->
        <div id="alertBox" class="hidden alert mb-4 text-sm font-medium rounded-xl"></div>

        <div class="admin-layout">

            <!-- ── Sidebar ─────────────────────────────────────── -->
            <aside class="admin-sidebar glass-card p-3 sticky top-20">
                <div class="px-3 py-2 mb-2">
                    <div class="text-xs opacity-30 font-semibold uppercase tracking-widest">管理后台</div>
                </div>
                <nav class="space-y-1">
                    <button class="sidebar-btn active" onclick="showSection('stats',this)">📊 系统概览</button>
                    <button class="sidebar-btn" onclick="showSection('users',this)">👥 用户管理</button>
                    <button class="sidebar-btn" onclick="showSection('orders',this)">📋 订单管理</button>
                    <button class="sidebar-btn" onclick="showSection('plans',this)">💎 套餐管理</button>
                    <button class="sidebar-btn" onclick="showSection('settings',this)">⚙️ 系统设置</button>
                </nav>
            </aside>

            <!-- ── Main Content ───────────────────────────────── -->
            <main>

                <!-- ── Stats ──────────────────────────────────────── -->
                <div id="sec-stats" class="tab-content active">
                    <div class="mb-4 text-lg font-bold">系统概览</div>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                        <div class="glass-card p-4 text-center">
                            <div class="text-2xl font-extrabold gradient-text-primary" id="stUsers">—</div>
                            <div class="text-xs opacity-40 mt-1">总用户</div>
                        </div>
                        <div class="glass-card p-4 text-center">
                            <div class="text-2xl font-extrabold text-primary" id="stRooms">—</div>
                            <div class="text-xs opacity-40 mt-1">总房间</div>
                        </div>
                        <div class="glass-card p-4 text-center">
                            <div class="text-2xl font-extrabold text-success" id="stActive">—</div>
                            <div class="text-xs opacity-40 mt-1">活跃房间</div>
                        </div>
                        <div class="glass-card p-4 text-center">
                            <div class="text-2xl font-extrabold" id="stOrders">—</div>
                            <div class="text-xs opacity-40 mt-1">总订单</div>
                        </div>
                        <div class="glass-card p-4 text-center">
                            <div class="text-2xl font-extrabold text-accent" id="stRevenue">—</div>
                            <div class="text-xs opacity-40 mt-1">总收入</div>
                        </div>
                    </div>
                    <div class="glass-card p-6">
                        <div class="opacity-40 text-sm text-center py-4">更多图表功能即将推出</div>
                    </div>
                </div>

                <!-- ── Users ───────────────────────────────────────── -->
                <div id="sec-users" class="tab-content">
                    <div class="flex items-center justify-between mb-4">
                        <div class="text-lg font-bold">用户管理</div>
                        <div class="flex gap-2">
                            <input type="text" id="userSearch" placeholder="搜索邮箱或昵称..."
                                class="input input-sm input-bordered glass-input rounded-xl w-52"
                                oninput="debounceSearch()">
                        </div>
                    </div>
                    <div class="glass-card overflow-hidden">
                        <table class="table dark-table w-full">
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>套餐</th>
                                    <th>余额</th>
                                    <th>角色</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <tr>
                                    <td colspan="6" class="text-center py-10 opacity-30">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="flex justify-between items-center p-4 border-t border-white/5 text-xs opacity-40">
                            <span id="userPagInfo">—</span>
                            <div class="flex gap-2">
                                <button id="userPrevBtn" onclick="loadUsers(currentUserPage-1)"
                                    class="btn btn-xs btn-ghost disabled:opacity-20" disabled>上一页</button>
                                <button id="userNextBtn" onclick="loadUsers(currentUserPage+1)"
                                    class="btn btn-xs btn-ghost disabled:opacity-20" disabled>下一页</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── Orders ──────────────────────────────────────── -->
                <div id="sec-orders" class="tab-content">
                    <div class="flex items-center justify-between mb-4">
                        <div class="text-lg font-bold">订单管理</div>
                        <div class="flex gap-2">
                            <select id="orderStatus" class="select select-sm select-bordered glass-input rounded-xl"
                                onchange="loadOrders(1)">
                                <option value="">全部状态</option>
                                <option value="pending">待支付</option>
                                <option value="paid">已支付</option>
                                <option value="failed">失败</option>
                                <option value="refunded">已退款</option>
                            </select>
                            <input type="text" id="orderSearch" placeholder="订单号或邮箱..."
                                class="input input-sm input-bordered glass-input rounded-xl w-44"
                                oninput="debounceOrderSearch()">
                        </div>
                    </div>
                    <div class="glass-card overflow-hidden">
                        <table class="table dark-table w-full">
                            <thead>
                                <tr>
                                    <th>订单号</th>
                                    <th>用户</th>
                                    <th>金额</th>
                                    <th>方式</th>
                                    <th>状态</th>
                                    <th>时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="orderTableBody">
                                <tr>
                                    <td colspan="7" class="text-center py-10 opacity-30">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="flex justify-between items-center p-4 border-t border-white/5 text-xs opacity-40">
                            <span id="orderPagInfo">—</span>
                            <div class="flex gap-2">
                                <button id="orderPrevBtn" onclick="loadOrders(currentOrderPage-1)"
                                    class="btn btn-xs btn-ghost" disabled>上一页</button>
                                <button id="orderNextBtn" onclick="loadOrders(currentOrderPage+1)"
                                    class="btn btn-xs btn-ghost" disabled>下一页</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── Plans ───────────────────────────────────────── -->
                <div id="sec-plans" class="tab-content">
                    <div class="mb-4 text-lg font-bold">套餐管理</div>
                    <div class="glass-card overflow-hidden">
                        <table class="table dark-table w-full">
                            <thead>
                                <tr>
                                    <th>套餐名</th>
                                    <th>Code</th>
                                    <th>房间上限</th>
                                    <th>月价</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="plansTableBody">
                                <tr>
                                    <td colspan="5" class="text-center py-10 opacity-30">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- ── Settings ─────────────────────────────────────── -->
                <div id="sec-settings" class="tab-content">
                    <div class="mb-4 text-lg font-bold">系统设置</div>
                    <div class="glass-card p-6">
                        <div id="settingsContent">
                            <div class="text-center py-8 opacity-30"><span class="loading loading-spinner"></span></div>
                        </div>
                        <div class="gradient-divider"></div>
                        <button onclick="saveSettings()"
                            class="btn gradient-btn text-white rounded-xl px-8">保存设置</button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- ── User Edit Modal ─────────────────────────────────── -->
    <dialog id="userModal" class="modal">
        <div class="modal-box glass-card border border-white/8 max-w-lg">
            <h3 class="font-bold text-lg mb-6">操作用户 — <span id="modalUserEmail"
                    class="text-primary opacity-70 text-sm font-normal"></span></h3>
            <input type="hidden" id="modalUserId">

            <div class="space-y-4">
                <!-- Role + Status -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-control">
                        <label class="label pb-1"><span class="label-text opacity-60 text-xs">角色</span></label>
                        <select id="modalRole" class="select select-bordered glass-input rounded-xl select-sm">
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="form-control">
                        <label class="label pb-1"><span class="label-text opacity-60 text-xs">状态</span></label>
                        <select id="modalStatus" class="select select-bordered glass-input rounded-xl select-sm">
                            <option value="active">正常</option>
                            <option value="banned">封禁</option>
                        </select>
                    </div>
                </div>

                <!-- Balance Adjust -->
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text opacity-60 text-xs">调整余额 (元,
                            正数增加/负数减少)</span></label>
                    <div class="flex gap-2">
                        <input type="number" id="modalBalanceAdj"
                            class="input input-bordered glass-input rounded-xl flex-1 input-sm"
                            placeholder="如: 100 或 -50">
                        <input type="text" id="modalBalanceReason"
                            class="input input-bordered glass-input rounded-xl flex-1 input-sm" placeholder="原因备注">
                    </div>
                </div>

                <!-- Set Subscription -->
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text opacity-60 text-xs">手动设置订阅</span></label>
                    <div class="grid grid-cols-3 gap-2">
                        <select id="modalPlanCode" class="select select-bordered glass-input rounded-xl select-sm">
                            <option value="">选择套餐...</option>
                        </select>
                        <input type="number" id="modalSubDays"
                            class="input input-bordered glass-input rounded-xl input-sm" placeholder="天数" min="1"
                            value="30">
                        <button onclick="setSubscription()" class="btn btn-xs btn-outline rounded-lg h-10">设置订阅</button>
                    </div>
                </div>

                <!-- Reset Password -->
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text opacity-60 text-xs">重置密码</span></label>
                    <div class="flex gap-2">
                        <input type="text" id="modalNewPwd"
                            class="input input-bordered glass-input rounded-xl flex-1 input-sm"
                            placeholder="新密码 (至少6位)">
                        <button onclick="resetPassword()" class="btn btn-xs btn-warning rounded-lg h-10">重置</button>
                    </div>
                </div>
            </div>

            <div class="modal-action gap-2 mt-6">
                <form method="dialog"><button class="btn btn-ghost rounded-xl">关闭</button></form>
                <button onclick="saveUser()" class="btn gradient-btn text-white rounded-xl px-6">保存信息</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button></button></form>
    </dialog>

    <script>
        let currentUserPage = 1;
        let currentOrderPage = 1;
        let userSearchTimer, orderSearchTimer;

        // ── Section Switching ───────────────────────────────────
        function showSection(name, btn) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + name).classList.add('active');
            btn.classList.add('active');

            // Lazy load
            if (name === 'users' && document.getElementById('userTableBody').innerHTML.includes('加载中')) loadUsers(1);
            if (name === 'orders' && document.getElementById('orderTableBody').innerHTML.includes('加载中')) loadOrders(1);
            if (name === 'plans' && document.getElementById('plansTableBody').innerHTML.includes('加载中')) loadPlans();
            if (name === 'settings' && document.getElementById('settingsContent').innerHTML.includes('loading')) loadSettings();
        }

        // ── Formatters ──────────────────────────────────────────
        function fmtCny(cents) { return '¥' + ((cents || 0) / 100).toFixed(2); }
        function fmtTime(d) { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('zh-CN') + ' ' + dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
        function statusBadge(s) { const m = { active: 'badge-success', banned: 'badge-error', paid: 'badge-success', pending: 'badge-warning', failed: 'badge-error', refunded: 'badge-ghost', expired: 'badge-ghost' }; const n = { active: '正常', banned: '封禁', paid: '已支付', pending: '待支付', failed: '失败', refunded: '已退款', expired: '已过期' }; return `<span class="badge ${m[s] || 'badge-ghost'} badge-xs">${n[s] || s}</span>`; }
        function showAlert(msg, type = 'info') { const b = document.getElementById('alertBox'); b.className = `alert alert-${type} mb-4 text-sm font-medium rounded-xl`; b.innerHTML = `<span>${msg}</span>`; b.classList.remove('hidden'); setTimeout(() => b.classList.add('hidden'), 4000); }

        // ── Stats ───────────────────────────────────────────────
        async function loadStats() {
            try {
                const r = await fetch('/api/admin/stats');
                const d = await r.json();
                document.getElementById('stUsers').textContent = d.totalUsers ?? '—';
                document.getElementById('stRooms').textContent = d.totalRooms ?? '—';
                document.getElementById('stActive').textContent = d.activeRooms ?? '—';
                document.getElementById('stOrders').textContent = d.totalOrders ?? '—';
                document.getElementById('stRevenue').textContent = fmtCny(d.totalRevenue);
            } catch { }
        }

        // ── Users ───────────────────────────────────────────────
        function debounceSearch() { clearTimeout(userSearchTimer); userSearchTimer = setTimeout(() => loadUsers(1), 400); }

        async function loadUsers(page = 1) {
            currentUserPage = page;
            const search = document.getElementById('userSearch').value.trim();
            const body = document.getElementById('userTableBody');
            body.innerHTML = '<tr><td colspan="6" class="text-center py-8 opacity-30"><span class="loading loading-spinner loading-sm"></span></td></tr>';
            try {
                const res = await fetch(`/api/admin/users?page=${page}&limit=20&search=${encodeURIComponent(search)}`);
                const d = await res.json();
                const users = d.data || [];
                const pag = d.pagination || {};

                body.innerHTML = users.length === 0
                    ? '<tr><td colspan="6" class="text-center py-10 opacity-30">没有找到用户</td></tr>'
                    : users.map(u => `
            <tr>
              <td>
                <div class="font-medium text-sm">${u.nickname || '—'}</div>
                <div class="text-xs opacity-40">${u.email}</div>
              </td>
              <td>
                <div class="text-xs font-medium">${u.plan_name || '未订阅'}</div>
                ${u.subscription_end ? `<div class="text-[10px] opacity-30">至 ${new Date(u.subscription_end).toLocaleDateString('zh-CN')}</div>` : ''}
              </td>
              <td class="font-mono text-sm">${fmtCny(u.balance)}</td>
              <td>${u.role === 'admin' ? '<span class="badge badge-warning badge-xs">Admin</span>' : '<span class="badge badge-ghost badge-xs">User</span>'}</td>
              <td>${statusBadge(u.status)}</td>
              <td>
                <button onclick="openUserModal(${JSON.stringify(u).replace(/"/g, '&quot;')})" class="btn btn-xs btn-outline rounded-lg">操作</button>
              </td>
            </tr>`).join('');

                document.getElementById('userPagInfo').textContent = `第 ${pag.page || 1} / ${pag.totalPages || 1} 页，共 ${pag.total || 0} 个用户`;
                document.getElementById('userPrevBtn').disabled = (pag.page || 1) <= 1;
                document.getElementById('userNextBtn').disabled = (pag.page || 1) >= (pag.totalPages || 1);
            } catch { body.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-error text-sm">加载失败</td></tr>'; }
        }

        function openUserModal(u) {
            document.getElementById('modalUserId').value = u.id;
            document.getElementById('modalUserEmail').textContent = u.email;
            document.getElementById('modalRole').value = u.role;
            document.getElementById('modalStatus').value = u.status;
            document.getElementById('modalBalanceAdj').value = '';
            document.getElementById('modalBalanceReason').value = '';
            document.getElementById('modalNewPwd').value = '';
            document.getElementById('userModal').showModal();
        }

        async function saveUser() {
            const id = document.getElementById('modalUserId').value;
            const role = document.getElementById('modalRole').value;
            const status = document.getElementById('modalStatus').value;
            try {
                const res = await fetch(`/api/admin/users/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role, status }) });
                if (!res.ok) throw new Error((await res.json()).error);
                const adj = parseFloat(document.getElementById('modalBalanceAdj').value);
                if (adj && adj !== 0) {
                    const r2 = await fetch(`/api/admin/users/${id}/adjust-balance`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ amount: Math.round(adj * 100), reason: document.getElementById('modalBalanceReason').value })
                    });
                    if (!r2.ok) throw new Error((await r2.json()).error);
                }
                showAlert('用户信息已更新', 'success');
                document.getElementById('userModal').close();
                loadUsers(currentUserPage);
            } catch (e) { showAlert(e.message || '操作失败', 'error'); }
        }

        async function setSubscription() {
            const id = document.getElementById('modalUserId').value;
            const plan = document.getElementById('modalPlanCode').value;
            const days = parseInt(document.getElementById('modalSubDays').value) || 30;
            if (!plan) { showAlert('请选择套餐', 'warning'); return; }
            try {
                const res = await fetch(`/api/admin/users/${id}/set-subscription`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ planCode: plan, durationDays: days })
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error);
                showAlert(d.message || '订阅设置成功', 'success');
            } catch (e) { showAlert(e.message || '操作失败', 'error'); }
        }

        async function resetPassword() {
            const id = document.getElementById('modalUserId').value;
            const pwd = document.getElementById('modalNewPwd').value;
            if (!pwd || pwd.length < 6) { showAlert('密码至少6位', 'warning'); return; }
            try {
                const res = await fetch(`/api/admin/users/${id}/reset-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword: pwd })
                });
                if (!res.ok) throw new Error((await res.json()).error);
                showAlert('密码已重置', 'success');
                document.getElementById('modalNewPwd').value = '';
            } catch (e) { showAlert(e.message || '操作失败', 'error'); }
        }

        // ── Orders ──────────────────────────────────────────────
        function debounceOrderSearch() { clearTimeout(orderSearchTimer); orderSearchTimer = setTimeout(() => loadOrders(1), 400); }

        async function loadOrders(page = 1) {
            currentOrderPage = page;
            const status = document.getElementById('orderStatus').value;
            const search = document.getElementById('orderSearch').value.trim();
            const body = document.getElementById('orderTableBody');
            body.innerHTML = '<tr><td colspan="7" class="text-center py-8 opacity-30"><span class="loading loading-spinner loading-sm"></span></td></tr>';
            try {
                const res = await fetch(`/api/admin/orders?page=${page}&limit=20&status=${status}&search=${encodeURIComponent(search)}`);
                const d = await res.json();
                const ords = d.data || [];
                const pag = d.pagination || {};
                body.innerHTML = ords.length === 0
                    ? '<tr><td colspan="7" class="text-center py-10 opacity-30">没有找到订单</td></tr>'
                    : ords.map(o => `<tr>
              <td class="font-mono text-xs opacity-50">${o.order_no}</td>
              <td><div class="text-sm">${o.user_nickname || '—'}</div><div class="text-[10px] opacity-30">${o.user_email}</div></td>
              <td class="font-bold">${fmtCny(o.amount)}</td>
              <td class="text-xs opacity-60">${o.payment_method || '—'}</td>
              <td>${statusBadge(o.status)}</td>
              <td class="text-xs opacity-40">${fmtTime(o.created_at)}</td>
              <td>
                <select class="select select-xs select-bordered glass-input rounded-lg" onchange="updateOrderStatus(${o.id}, this.value)">
                  <option value="">操作</option>
                  <option value="paid">标记已付</option>
                  <option value="refunded">标记退款</option>
                  <option value="failed">标记失败</option>
                </select>
              </td>
            </tr>`).join('');
                document.getElementById('orderPagInfo').textContent = `第 ${pag.page || 1} / ${pag.totalPages || 1} 页，共 ${pag.total || 0} 条`;
                document.getElementById('orderPrevBtn').disabled = (pag.page || 1) <= 1;
                document.getElementById('orderNextBtn').disabled = (pag.page || 1) >= (pag.totalPages || 1);
            } catch { body.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-error text-sm">加载失败</td></tr>'; }
        }

        async function updateOrderStatus(id, status) {
            if (!status) return;
            try {
                const res = await fetch(`/api/admin/orders/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
                if (!res.ok) throw new Error((await res.json()).error);
                showAlert('订单状态已更新', 'success');
                loadOrders(currentOrderPage);
            } catch (e) { showAlert(e.message, 'error'); }
        }

        // ── Plans ───────────────────────────────────────────────
        async function loadPlans() {
            try {
                const [pubRes, adminRes] = await Promise.all([
                    fetch('/api/subscription/plans'),
                    fetch('/api/admin/plans')
                ]);
                const plans = pubRes.ok ? await pubRes.json() : await adminRes.json();

                // Also populate modal dropdown
                const planSel = document.getElementById('modalPlanCode');
                planSel.innerHTML = '<option value="">选择套餐...</option>' + plans.map(p => `<option value="${p.plan_code || p.code}">${p.plan_name || p.name}</option>`).join('');

                document.getElementById('plansTableBody').innerHTML = plans.length === 0
                    ? '<tr><td colspan="5" class="text-center py-10 opacity-30">无套餐数据</td></tr>'
                    : plans.map(p => `<tr>
              <td class="font-semibold">${p.plan_name || p.name}</td>
              <td class="font-mono text-xs opacity-60">${p.plan_code || p.code}</td>
              <td>${p.max_rooms || p.room_limit === -1 ? '∞' : (p.max_rooms || p.room_limit)}</td>
              <td class="font-bold">${fmtCny(p.base_price || p.price_monthly)}</td>
              <td><span class="badge ${p.status === 'active' ? 'badge-success' : 'badge-ghost'} badge-xs">${p.status === 'active' ? '启用' : '禁用'}</span></td>
            </tr>`).join('');
            } catch { document.getElementById('plansTableBody').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-error text-sm">加载失败</td></tr>'; }
        }

        // ── Settings ─────────────────────────────────────────────
        let settingsData = {};
        async function loadSettings() {
            try {
                const res = await fetch('/api/admin/settings');
                settingsData = await res.json();
                const entries = Object.entries(settingsData);
                document.getElementById('settingsContent').innerHTML = entries.length === 0
                    ? '<div class="text-center py-6 opacity-30 text-sm">暂无可配置的设置项</div>'
                    : `<div class="space-y-4">${entries.map(([k, v]) => `
              <div class="form-control">
                <label class="label pb-1"><span class="label-text opacity-60 text-xs">${k}</span></label>
                <input type="text" class="input input-bordered glass-input rounded-xl input-sm" id="setting-${k}" value="${v || ''}">
              </div>`).join('')}</div>`;
            } catch { document.getElementById('settingsContent').innerHTML = '<div class="text-error text-sm">加载失败</div>'; }
        }

        async function saveSettings() {
            const updated = {};
            Object.keys(settingsData).forEach(k => {
                const el = document.getElementById('setting-' + k);
                if (el) updated[k] = el.value;
            });
            try {
                const res = await fetch('/api/admin/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
                if (!res.ok) throw new Error();
                showAlert('设置已保存', 'success');
            } catch { showAlert('保存失败', 'error'); }
        }

        // ── Init ────────────────────────────────────────────────
        window.initPage({
            requireAuth: true,
            requireAdmin: true,
            onReady() {
                loadStats();
                // Lazy load: plans data for modal dropdown
                fetch('/api/subscription/plans').then(r => r.json()).then(plans => {
                    const sel = document.getElementById('modalPlanCode');
                    sel.innerHTML = '<option value="">选择套餐...</option>' + plans.map(p => `<option value="${p.plan_code}">${p.plan_name}</option>`).join('');
                }).catch(() => { });
            }
        });
    </script>
</body>

</html>
