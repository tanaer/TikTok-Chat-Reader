<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-nav-active="none">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - TikTok Monitor</title>
    <meta name="description" content="注册 TikTok Monitor，免费开始监控 TikTok 直播数据">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="auth-bg">

    <div class="w-full max-w-md relative z-10">

        <!-- Brand Header -->
        <div class="text-center mb-8 animate-fade-in">
            <a href="/landing/index.html" class="inline-flex items-center gap-3 mb-4">
                <span class="text-4xl">📺</span>
                <span class="text-3xl font-extrabold gradient-text-primary">TikTok Monitor</span>
            </a>
            <p class="text-base-content/40 text-sm">创建账户，免费开始使用</p>
        </div>

        <!-- Register Card -->
        <div class="glass-card p-8 shadow-2xl animate-fade-in-up delay-100">

            <!-- Alert Box -->
            <div id="alertBox" class="hidden alert mb-6 text-sm font-medium rounded-xl"></div>

            <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4">

                <!-- Nickname -->
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text opacity-70 text-sm">昵称 <span
                                class="opacity-40">(可选)</span></span></label>
                    <label class="input input-bordered glass-input rounded-xl flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-40" viewBox="0 0 24 24"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z"
                                clip-rule="evenodd" />
                        </svg>
                        <input type="text" id="nickname" class="grow bg-transparent text-sm" placeholder="你的显示名称"
                            maxlength="30" autocomplete="nickname">
                    </label>
                </div>

                <!-- Email -->
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text opacity-70 text-sm">邮箱地址</span></label>
                    <label class="input input-bordered glass-input rounded-xl flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-40" viewBox="0 0 16 16"
                            fill="currentColor">
                            <path
                                d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793c.026.009.051.02.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185A.755.755 0 0 1 15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z" />
                            <path
                                d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z" />
                        </svg>
                        <input type="email" id="email" class="grow bg-transparent text-sm" placeholder="your@email.com"
                            required autocomplete="email">
                    </label>
                </div>

                <!-- Password -->
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text opacity-70 text-sm">密码 <span
                                class="opacity-40">(至少6位)</span></span></label>
                    <label class="input input-bordered glass-input rounded-xl flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-40" viewBox="0 0 16 16"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
                                clip-rule="evenodd" />
                        </svg>
                        <input type="password" id="password" class="grow bg-transparent text-sm" placeholder="••••••••"
                            required minlength="6" autocomplete="new-password">
                        <button type="button" onclick="togglePwd('password')"
                            class="btn btn-ghost btn-xs btn-circle opacity-50 hover:opacity-100">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                            </svg>
                        </button>
                    </label>
                </div>

                <!-- Confirm Password -->
                <div class="form-control">
                    <label class="label pb-1"><span class="label-text opacity-70 text-sm">确认密码</span></label>
                    <label class="input input-bordered glass-input rounded-xl flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-40" viewBox="0 0 16 16"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
                                clip-rule="evenodd" />
                        </svg>
                        <input type="password" id="confirmPassword" class="grow bg-transparent text-sm"
                            placeholder="••••••••" required autocomplete="new-password">
                    </label>
                </div>

                <!-- Password strength bar -->
                <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                    <div id="strengthBar" class="h-full rounded-full transition-all duration-300"
                        style="width:0;background:#6366f1"></div>
                </div>

                <!-- Submit -->
                <div class="pt-2">
                    <button type="submit" id="submitBtn"
                        class="btn btn-block gradient-btn text-white font-semibold rounded-xl h-12">
                        创建账户
                    </button>
                </div>

                <p class="text-center text-xs opacity-30">注册即表示您同意我们的服务条款和隐私政策</p>

            </form>

            <div class="gradient-divider"></div>

            <div class="text-center text-sm">
                <span class="opacity-40">已有账户？</span>
                <a href="login.html" class="link link-primary ml-1 font-medium">立即登录 →</a>
            </div>

        </div>

        <div class="text-center mt-6 animate-fade-in delay-300">
            <a href="/landing/index.html" class="text-xs opacity-30 hover:opacity-60 transition-opacity">← 返回首页</a>
        </div>

    </div>

    <script src="/auth.js"></script>
    <script>
        if (localStorage.getItem('accessToken')) window.location.href = '/';

        function togglePwd(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alertBox');
            const colors = { error: 'alert-error', success: 'alert-success', warning: 'alert-warning' };
            box.className = `alert ${colors[type] || 'alert-info'} mb-6 text-sm font-medium rounded-xl`;
            box.innerHTML = `<span>${msg}</span>`;
            box.classList.remove('hidden');
        }

        // Password strength indicator
        document.getElementById('password').addEventListener('input', function () {
            const v = this.value;
            let s = 0;
            if (v.length >= 6) s++;
            if (v.length >= 10) s++;
            if (/[A-Z]/.test(v)) s++;
            if (/[0-9]/.test(v)) s++;
            if (/[^A-Za-z0-9]/.test(v)) s++;
            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#6366f1'];
            const bar = document.getElementById('strengthBar');
            bar.style.width = `${s * 20}%`;
            bar.style.background = colors[s - 1] || '#6366f1';
        });

        async function handleRegister(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const conf = document.getElementById('confirmPassword').value;

            if (pass !== conf) {
                showAlert('两次输入的密码不一致');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const orig = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> 注册中...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: pass,
                        nickname: document.getElementById('nickname').value.trim() || undefined
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '注册失败');

                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);

                btn.innerHTML = '✅ 注册成功！';
                btn.classList.add('btn-success');
                setTimeout(() => window.location.href = '/landing/user-center.html', 800);

            } catch (err) {
                showAlert(err.message);
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
