<!DOCTYPE html>
<html lang="zh-CN" data-theme="dracula">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(20, 20, 30, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 80% 50%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(0, 245, 212, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md my-8">
        <!-- Card -->
        <div class="card glass-panel shadow-2xl">
            <div class="card-body">
                <div class="text-center mb-6">
                    <h1 class="text-4xl font-extrabold mb-2 tracking-tight">
                        <span class="bg-gradient-to-r from-accent to-primary bg-clip-text text-transparent">加入
                            Monitor</span>
                    </h1>
                    <p class="text-base-content/60">创建您的账户以开始使用</p>
                </div>

                <div id="alertBox" class="alert hidden shadow-lg mb-4 text-sm font-medium"></div>

                <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4">
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">邮箱地址</span>
                        </label>
                        <label
                            class="input input-bordered flex items-center gap-2 bg-base-200/50 hover:bg-base-200/80 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                                class="w-4 h-4 opacity-70">
                                <path
                                    d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793c.026.009.051.02.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185A.755.755 0 0 1 15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z" />
                                <path
                                    d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z" />
                            </svg>
                            <input type="email" id="email" class="grow bg-transparent" placeholder="your@email.com"
                                required autocomplete="email" />
                        </label>
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">昵称 <span
                                    class="text-base-content/40 text-xs ml-1">(可选)</span></span>
                        </label>
                        <label
                            class="input input-bordered flex items-center gap-2 bg-base-200/50 hover:bg-base-200/80 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                                class="w-4 h-4 opacity-70">
                                <path
                                    d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM12.735 14c.618 0 1.093-.561.872-1.139a6.002 6.002 0 0 0-11.215 0c-.22.578.254 1.139.872 1.139h9.47Z" />
                            </svg>
                            <input type="text" id="nickname" class="grow bg-transparent" placeholder="您的显示名称"
                                autocomplete="nickname" />
                        </label>
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">密码</span>
                        </label>
                        <label
                            class="input input-bordered flex items-center gap-2 bg-base-200/50 hover:bg-base-200/80 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                                class="w-4 h-4 opacity-70">
                                <path fill-rule="evenodd"
                                    d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
                                    clip-rule="evenodd" />
                            </svg>
                            <input type="password" id="password" class="grow bg-transparent" placeholder="至少6位" required
                                minlength="6" autocomplete="new-password" />
                            <button type="button" class="btn btn-ghost btn-xs btn-circle opacity-70"
                                onclick="togglePassword('password')">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </label>
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">确认密码</span>
                        </label>
                        <label
                            class="input input-bordered flex items-center gap-2 bg-base-200/50 hover:bg-base-200/80 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                                class="w-4 h-4 opacity-70">
                                <path fill-rule="evenodd"
                                    d="M14 6a4 4 0 0 1-4.899 3.899l-1.955 1.955a.5.5 0 0 1-.353.146H5v1.5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2.293a.5.5 0 0 1 .146-.353l3.955-3.955A4 4 0 1 1 14 6Zm-4-2a.75.75 0 0 0 0 1.5.5.5 0 0 1 .5.5.75.75 0 0 0 1.5 0 2 2 0 0 0-2-2Z"
                                    clip-rule="evenodd" />
                            </svg>
                            <input type="password" id="confirmPassword" class="grow bg-transparent" placeholder="再次输入密码"
                                required minlength="6" autocomplete="new-password" />
                            <button type="button" class="btn btn-ghost btn-xs btn-circle opacity-70"
                                onclick="togglePassword('confirmPassword')">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </label>
                    </div>

                    <div class="form-control mt-6">
                        <button type="submit"
                            class="btn border-none bg-gradient-to-r from-accent to-secondary text-base-100 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg"
                            id="submitBtn">
                            注 册 账 户
                        </button>
                    </div>
                </form>

                <div class="divider text-base-content/40 text-sm mt-6">已有账户？</div>

                <div class="text-center text-sm">
                    <a href="login.html"
                        class="link link-accent hover:link-primary transition-colors font-medium">返回登录</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('accessToken')) {
            window.location.href = '/';
        }

        function showAlert(message, type = 'error') {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type} shadow-lg mb-4 text-sm font-medium ${type === 'error' ? 'animate-bounce' : 'animate-pulse'}`;
            box.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${type === 'error' ? 'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z' : 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'}" /></svg>
                <span>${message}</span>
            `;
            box.classList.remove('hidden');
        }

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');

            const email = document.getElementById('email').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('两次输入的密码不一致', 'error');
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-spinner"></span> 注册中...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, nickname: nickname || undefined })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '注册失败');
                }

                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);

                showAlert('注册成功！正在跳转...', 'success');
                btn.innerHTML = '注册成功!';
                btn.classList.add('btn-success');

                setTimeout(() => {
                    window.location.href = '/';
                }, 800);
            } catch (err) {
                showAlert(err.message, 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
