<!DOCTYPE html>
<html lang="zh-CN" data-theme="dracula">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 80% 80%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 20%, rgba(0, 245, 212, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body class="min-h-screen text-base-content p-4 md:p-8 flex items-start justify-center">
    <div class="w-full max-w-2xl mt-4 md:mt-10">

        <div class="mb-8">
            <a href="/" class="btn btn-ghost btn-sm text-base-content/60 hover:text-primary gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                返回控制台
            </a>
        </div>

        <h1 class="text-3xl font-extrabold mb-6 tracking-tight">账户设置</h1>

        <!-- Sub Quick View Card -->
        <div class="card bg-base-100/60 backdrop-blur-md shadow-lg border border-white/5 mb-6">
            <div class="card-body p-6">
                <h2 class="card-title text-lg flex items-center gap-2 mb-2">
                    <span class="text-secondary">💎</span> 账户概览
                </h2>
                <div id="subInfo" class="flex items-center gap-3 text-sm opacity-50 py-2">
                    <span class="loading loading-spinner loading-sm"></span> 加载中...
                </div>
                <div class="card-actions justify-end mt-2">
                    <a href="user-center.html" class="btn btn-outline btn-sm">前往用户中心</a>
                    <a href="pricing.html" class="btn btn-primary btn-sm shadow-md">升级套餐</a>
                </div>
            </div>
        </div>

        <!-- Profile Settings Card -->
        <div class="card bg-base-100/60 backdrop-blur-md shadow-lg border border-white/5 mb-6">
            <div class="card-body p-6">
                <h2 class="card-title text-lg flex items-center gap-2 mb-4 border-b border-base-content/10 pb-4">
                    <span class="text-primary">👤</span> 基本信息
                </h2>

                <div id="profileLoader" class="py-4 text-center opacity-50">
                    <span class="loading loading-spinner"></span>
                </div>

                <form id="profileForm" class="hidden space-y-4" onsubmit="handleUpdateProfile(event)">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="form-control">
                            <label class="label"><span class="label-text">邮箱账号</span></label>
                            <input type="email" id="profileEmail"
                                class="input input-bordered bg-base-200/50 cursor-not-allowed text-base-content/60"
                                disabled />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text">显示昵称</span></label>
                            <input type="text" id="profileNickname" placeholder="您的显示名称"
                                class="input input-bordered bg-base-200/50 focus:border-primary transition-colors" />
                        </div>
                    </div>

                    <div class="flex justify-end mt-6 pt-4">
                        <button type="submit" class="btn btn-primary px-8 shadow-sm" id="profileBtn">保存更改</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Password Change Card -->
        <div class="card bg-base-100/60 backdrop-blur-md shadow-lg border border-white/5 mb-10">
            <div class="card-body p-6">
                <h2 class="card-title text-lg flex items-center gap-2 mb-4 border-b border-base-content/10 pb-4">
                    <span class="text-accent">🔒</span> 安全设置
                </h2>

                <form id="passwordForm" onsubmit="handleChangePassword(event)" class="space-y-4 max-w-sm">
                    <div class="form-control">
                        <label class="label"><span class="label-text">当前密码</span></label>
                        <div class="relative">
                            <input type="password" id="oldPassword"
                                class="input input-bordered w-full bg-base-200/50 pr-10 focus:border-accent transition-colors"
                                placeholder="输入当前密码" required autocomplete="current-password" />
                            <button type="button"
                                class="absolute inset-y-0 right-0 px-3 flex items-center opacity-50 hover:opacity-100"
                                onclick="togglePwd('oldPassword')">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-control">
                        <label class="label"><span class="label-text">新密码</span></label>
                        <div class="relative">
                            <input type="password" id="newPassword"
                                class="input input-bordered w-full bg-base-200/50 pr-10 focus:border-accent transition-colors"
                                placeholder="至少6位新密码" required minlength="6" autocomplete="new-password" />
                            <button type="button"
                                class="absolute inset-y-0 right-0 px-3 flex items-center opacity-50 hover:opacity-100"
                                onclick="togglePwd('newPassword')">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-control">
                        <label class="label"><span class="label-text">确认新密码</span></label>
                        <div class="relative">
                            <input type="password" id="confirmNewPassword"
                                class="input input-bordered w-full bg-base-200/50 pr-10 focus:border-accent transition-colors"
                                placeholder="再次输入新密码" required minlength="6" autocomplete="new-password" />
                            <button type="button"
                                class="absolute inset-y-0 right-0 px-3 flex items-center opacity-50 hover:opacity-100"
                                onclick="togglePwd('confirmNewPassword')">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="mt-6 pt-2">
                        <button type="submit" class="btn btn-accent px-8 shadow-sm" id="pwdBtn">修改密码</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <dialog id="messageModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border border-base-content/10">
            <h3 class="font-bold text-lg flex items-center gap-2" id="modalTitle">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-info" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                提示
            </h3>
            <p class="py-4 whitespace-pre-line" id="modalMsg"></p>
            <div class="modal-action">
                <form method="dialog" class="flex gap-2 w-full justify-end">
                    <button class="btn btn-primary" id="modalConfirmBtn">确定</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <div id="toastContainer" class="toast toast-top toast-center z-50 mt-4 transition-all"></div>

    <script>
        const accessToken = localStorage.getItem('accessToken');
        if (!accessToken) { window.location.href = 'login.html'; }

        // Modal replace native alert
        function showModal(title, msg, isError = false) {
            return new Promise(resolve => {
                const titleIcon = document.querySelector('#modalTitle svg');
                if (isError) {
                    titleIcon.classList.replace('text-info', 'text-error');
                    titleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />';
                } else {
                    titleIcon.classList.replace('text-error', 'text-info');
                    titleIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />';
                }

                document.getElementById('modalTitle').innerHTML = titleIcon.outerHTML + `<span>${title}</span>`;
                document.getElementById('modalMsg').innerText = msg;
                document.getElementById('modalConfirmBtn').onclick = () => resolve(true);

                document.getElementById('messageModal').showModal();
            });
        }

        // Toast notifications
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} shadow-lg mb-2 animate-bounce`;
            alert.innerHTML = `<span>${msg}</span>`;
            container.appendChild(alert);
            setTimeout(() => {
                alert.classList.replace('animate-bounce', 'opacity-0');
                setTimeout(() => alert.remove(), 300);
            }, 3000);
        }

        function togglePwd(fieldId) {
            const input = document.getElementById(fieldId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function loadProfile() {
            try {
                const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${accessToken}` } });
                if (!res.ok) {
                    if (res.status === 401) { window.location.href = 'login.html'; return; }
                    throw new Error('加载失败');
                }
                const user = await res.json();

                document.getElementById('profileEmail').value = user.email;
                document.getElementById('profileNickname').value = user.nickname || '';

                document.getElementById('profileLoader').classList.add('hidden');
                document.getElementById('profileForm').classList.remove('hidden');

                // Load Subscription concurrently
                loadSubscription();
            } catch (err) {
                document.getElementById('profileLoader').innerHTML = `<span class="text-error">加载失败: ${err.message}</span>`;
            }
        }

        async function loadSubscription() {
            try {
                const res = await fetch('/api/subscription', { headers: { 'Authorization': `Bearer ${accessToken}` } });
                if (!res.ok) throw new Error('加载失败');
                const sub = await res.json();

                const planName = sub.plan?.name || '免费版';
                const rooms = sub.roomUsage ? `${sub.roomUsage.current}/${sub.roomUsage.totalLimit === -1 ? '∞' : sub.roomUsage.totalLimit}` : '-';
                const days = sub.daysRemaining >= 0 ? `${sub.daysRemaining}天` : '永久';
                const balance = sub.balance || 0;
                const balanceStr = balance === 0 ? '¥0' : '¥' + (balance / 100).toFixed(balance % 100 === 0 ? 0 : 2);

                document.getElementById('subInfo').innerHTML = `
                    <div class="flex flex-wrap gap-4 md:gap-8 bg-base-200/50 rounded-lg p-4 w-full border border-base-content/5">
                        <div class="flex flex-col"><span class="text-xs opacity-50 mb-1">当前余额</span><span class="font-bold text-accent text-lg">${balanceStr}</span></div>
                        <div class="flex flex-col"><span class="text-xs opacity-50 mb-1">当前套餐</span><span class="font-bold text-primary text-lg">${planName}</span></div>
                        <div class="flex flex-col"><span class="text-xs opacity-50 mb-1">房间配额</span><span class="font-bold text-base-content text-lg">${rooms}</span></div>
                        <div class="flex flex-col"><span class="text-xs opacity-50 mb-1">剩余时间</span><span class="font-bold text-secondary text-lg">${days}</span></div>
                    </div>
                `;
            } catch {
                document.getElementById('subInfo').innerHTML = '<span class="text-error">无法加载订阅概览</span>';
            }
        }

        async function handleUpdateProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('profileBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-spinner"></span> 保存中...';
            btn.disabled = true;

            try {
                const nickname = document.getElementById('profileNickname').value.trim();
                const res = await fetch('/api/auth/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
                    body: JSON.stringify({ nickname })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '保存失败');

                showToast('个人资料已成功更新', 'success');
            } catch (err) {
                showModal('更新失败', err.message, true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function handleChangePassword(e) {
            e.preventDefault();

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNew = document.getElementById('confirmNewPassword').value;

            if (newPassword !== confirmNew) {
                showModal('输入错误', '两次输入的新密码不一致，请重新输入', true);
                return;
            }

            const btn = document.getElementById('pwdBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-spinner"></span> 正在修改...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '修改失败');

                document.getElementById('passwordForm').reset();
                showToast('密码已成功修改', 'success');
            } catch (err) {
                showModal('修改失败', err.message, true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        loadProfile();
    </script>
</body>

</html>
