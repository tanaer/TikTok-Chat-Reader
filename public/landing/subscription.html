<!DOCTYPE html>
<html lang="zh-CN" data-theme="luxury">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订阅 - TikTok Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(184, 134, 11, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

<body class="min-h-screen text-base-content p-4 md:p-8">
    <div class="max-w-4xl mx-auto">

        <div class="mb-8">
            <a href="/" class="btn btn-ghost btn-sm text-base-content/60 hover:text-primary gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                📺 返回监控中心
            </a>
        </div>

        <div id="subscriptionContent" class="flex justify-center items-center min-h-[50vh]">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

    </div>

    <!-- Alert Modal -->
    <dialog id="messageModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border border-base-content/10">
            <h3 class="font-bold text-lg flex items-center gap-2" id="modalTitle">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-info" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                提示
            </h3>
            <p class="py-4 whitespace-pre-line" id="modalMsg"></p>
            <div class="modal-action">
                <form method="dialog" class="flex gap-2 w-full justify-end">
                    <button class="btn btn-outline" id="modalCancelBtn" style="display:none;">取消</button>
                    <button class="btn btn-primary" id="modalConfirmBtn">确定</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script>
        function showModal(title, msg, isConfirm = false) {
            return new Promise(resolve => {
                document.getElementById('modalTitle').innerText = title;
                document.getElementById('modalMsg').innerText = msg;
                const cancelBtn = document.getElementById('modalCancelBtn');
                const confirmBtn = document.getElementById('modalConfirmBtn');

                cancelBtn.style.display = isConfirm ? 'block' : 'none';
                cancelBtn.onclick = () => resolve(false);
                confirmBtn.onclick = () => resolve(true);

                document.getElementById('messageModal').showModal();
                document.getElementById('messageModal').addEventListener('close', () => resolve(false), { once: true });
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('subscriptionContent');
            const accessToken = localStorage.getItem('accessToken');

            if (!accessToken) {
                window.location.href = '/landing/login.html';
                return;
            }

            try {
                const subResponse = await fetch('/api/subscription', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (!subResponse.ok) {
                    if (subResponse.status === 401) {
                        window.location.href = '/landing/login.html';
                        return;
                    }
                    throw new Error('Failed to load subscription');
                }

                const subscription = await subResponse.json();

                let badgeClass = 'badge-ghost';
                const code = subscription.plan?.code;
                if (code === 'basic') badgeClass = 'badge-accent';
                if (code === 'pro') badgeClass = 'badge-primary';
                if (code === 'enterprise') badgeClass = 'badge-secondary';

                container.innerHTML = `
                    <div class="card bg-base-100/80 backdrop-blur-xl shadow-2xl border border-white/10 mb-8">
                        <div class="card-body">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">我的订阅</h1>
                                    <p class="text-base-content/60 mt-1">管理您的订阅计划与用量</p>
                                </div>
                                <div class="badge ${badgeClass} badge-lg font-bold p-4 shadow-sm">${subscription.plan?.name || '免费版'}</div>
                            </div>

                            <div class="stats stats-vertical lg:stats-horizontal shadow bg-base-200/50 border border-base-content/5 mt-4">
                                <div class="stat place-items-center">
                                    <div class="stat-title">可监控房间</div>
                                    <div class="stat-value text-accent">${subscription.plan?.roomLimit === -1 ? '∞' : (subscription.plan?.roomLimit || 1)}</div>
                                </div>
                                <div class="stat place-items-center">
                                    <div class="stat-title">AI分析剩余</div>
                                    <div class="stat-value text-primary">${subscription.aiCreditsRemaining || 0}</div>
                                </div>
                                <div class="stat place-items-center">
                                    <div class="stat-title">剩余天数</div>
                                    <div class="stat-value text-secondary">${subscription.daysRemaining >= 0 ? subscription.daysRemaining : '∞'}</div>
                                </div>
                            </div>

                            ${subscription.endDate ? `
                                <div class="mt-6 p-4 bg-info/10 text-info rounded-xl text-sm flex items-center gap-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                    <div>
                                        订阅到期日: <strong>${new Date(subscription.endDate).toLocaleDateString('zh-CN')}</strong>
                                        <span class="opacity-80 ml-2">${subscription.autoRenew ? ' · 自动续费已开启' : ''}</span>
                                    </div>
                                </div>
                            ` : ''}

                            <div class="card-actions justify-end mt-8">
                                ${subscription.plan?.code !== 'free' ? `
                                    <button class="btn btn-ghost hover:bg-error/20 hover:text-error transition-colors" onclick="cancelAutoRenew()">取消自动续费</button>
                                ` : ''}
                                <a href="pricing.html" class="btn btn-primary shadow-lg shadow-primary/30 ml-2">升级/变一套餐</a>
                            </div>
                        </div>
                    </div>

                    <div class="card bg-base-100/60 backdrop-blur-xl shadow-xl border border-white/5">
                        <div class="card-body">
                            <h2 class="card-title text-xl mb-2">AI 分析额度</h2>
                            <div class="w-full bg-base-300 rounded-full h-2.5 mb-4">
                                <div class="bg-primary h-2.5 rounded-full" style="width: ${(subscription.aiCreditsUsed / (subscription.aiCreditsUsed + subscription.aiCreditsRemaining)) * 100 || 0}%"></div>
                            </div>
                            <p class="text-base-content/70">
                                本月已使用 <strong class="text-base-content">${subscription.aiCreditsUsed || 0}</strong> 次分析，剩余 <strong class="text-primary">${subscription.aiCreditsRemaining || 0}</strong> 次
                            </p>
                            <div class="card-actions justify-end mt-4">
                                <button class="btn btn-outline btn-sm hover:btn-primary" onclick="showModal('功能升级中','购买额外额度功能即将上线。敬请期待！')">购买额度</button>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `
                    <div class="alert alert-error shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        <span>加载失败: ${err.message}</span>
                        <div class="flex-none">
                            <button class="btn btn-sm" onclick="location.reload()">重试</button>
                        </div>
                    </div>
                `;
            }
        });

        async function cancelAutoRenew() {
            if (!(await showModal('确认取消续费', '确定取消自动续费？当前订阅期内仍可正常使用。', true))) return;

            const accessToken = localStorage.getItem('accessToken');
            try {
                const response = await fetch('/api/subscription/cancel', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (response.ok) {
                    await showModal('取消成功', '已成功取消自动续费');
                    location.reload();
                } else {
                    const data = await response.json();
                    showModal('取消失败', data.error || '操作失败');
                }
            } catch (err) {
                showModal('取消异常', '错误: ' + err.message);
            }
        }
    </script>
</body>

</html>
