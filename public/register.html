<!DOCTYPE html>
<html lang="zh-CN" data-theme="business">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - TikTok Live Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/email-verification-flow.js"></script>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center mb-2">TikTok Live Monitor</h2>
            <p class="text-center text-base-content/60 mb-6">创建新账户</p>

            <div id="errorMsg" class="alert alert-error hidden mb-4">
                <span id="errorText"></span>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">用户名 *</span></label>
                    <input type="text" id="username" class="input input-bordered w-full" placeholder="3-50个字符" required autofocus minlength="3" maxlength="50">
                    <label class="label py-1 min-h-6">
                        <span id="usernameStatus" class="label-text-alt"></span>
                    </label>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">昵称</span></label>
                    <input type="text" id="nickname" class="input input-bordered w-full" placeholder="可选，显示名称">
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text" id="email-label">邮箱</span></label>
                    <input type="email" id="email" class="input input-bordered w-full" placeholder="可选">
                    <label class="label py-1 min-h-6">
                        <span id="emailStatus" class="label-text-alt"></span>
                    </label>
                </div>
                <div class="form-control mb-4 hidden" id="code-group">
                    <label class="label"><span class="label-text">邮箱验证码 *</span></label>
                    <div class="join w-full">
                        <input type="text" id="emailCode" class="input input-bordered join-item flex-1" placeholder="6位数字" maxlength="6">
                        <button type="button" id="sendCodeBtn" class="btn btn-primary join-item">发送验证码</button>
                    </div>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">密码 *</span></label>
                    <input type="password" id="password" class="input input-bordered w-full" placeholder="至少6个字符" required minlength="6">
                </div>
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text">确认密码 *</span></label>
                    <input type="password" id="confirmPassword" class="input input-bordered w-full" placeholder="再次输入密码" required>
                </div>
                <button type="submit" id="registerBtn" class="btn btn-primary w-full">
                    <span id="registerBtnSpinner" class="loading loading-spinner loading-sm hidden" aria-hidden="true"></span>
                    <span id="registerBtnText">注册</span>
                </button>
            </form>

            <div class="divider">或</div>
            <p class="text-center text-sm">
                已有账户？<a href="/login.html" class="link link-primary">立即登录</a>
            </p>
            <p class="text-center text-sm mt-2">
                <a href="/" class="link link-ghost opacity-60">返回首页</a>
            </p>
        </div>
    </div>

    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = '/';
        }

        let emailVerificationRequired = false;
        let registerEmailCodeFlow = null;
        let usernameCheckToken = 0;
        let emailCheckToken = 0;

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        function setRegisterLoading(loading, text = '注册') {
            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('registerBtnText');
            const btnSpinner = document.getElementById('registerBtnSpinner');

            btn.disabled = loading;
            btn.setAttribute('aria-busy', loading ? 'true' : 'false');
            btnSpinner.classList.toggle('hidden', !loading);
            btnText.textContent = text;
        }

        function setFieldStatus(field, message = '', tone = 'muted') {
            const element = document.getElementById(`${field}Status`);
            if (!element) return;
            element.textContent = message;
            element.className = 'label-text-alt';
            if (!message) return;
            if (tone === 'success') element.classList.add('text-success');
            else if (tone === 'error') element.classList.add('text-error');
            else element.classList.add('text-base-content/55');
        }

        async function fetchRegisterAvailability(payload) {
            const res = await fetch('/api/auth/register-availability', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            return { ok: res.ok, data };
        }

        async function checkUsernameAvailability({ silent = false } = {}) {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                if (!silent) setFieldStatus('username', '请输入用户名', 'error');
                return false;
            }
            if (username.length < 3 || username.length > 50) {
                if (!silent) setFieldStatus('username', '用户名需为3-50个字符', 'error');
                return false;
            }

            const currentToken = ++usernameCheckToken;
            if (!silent) setFieldStatus('username', '检查中...', 'muted');

            try {
                const { ok, data } = await fetchRegisterAvailability({ username });
                if (currentToken !== usernameCheckToken) return false;
                if (!ok) {
                    if (!silent) setFieldStatus('username', data.error || '检查失败，请稍后重试', 'error');
                    return false;
                }
                const available = !!data.username?.available;
                if (!silent) setFieldStatus('username', data.username?.message || (available ? '用户名可用' : '用户名已被注册'), available ? 'success' : 'error');
                return available;
            } catch (err) {
                if (currentToken !== usernameCheckToken) return false;
                if (!silent) setFieldStatus('username', '检查失败，请稍后重试', 'error');
                return false;
            }
        }

        async function checkEmailAvailability({ silent = false, requireEmail = emailVerificationRequired } = {}) {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                if (requireEmail && !silent) setFieldStatus('email', '请输入邮箱地址', 'error');
                if (!requireEmail) setFieldStatus('email');
                return !requireEmail;
            }
            if (!isValidEmail(email)) {
                if (!silent) setFieldStatus('email', '请输入有效的邮箱地址', 'error');
                return false;
            }

            const currentToken = ++emailCheckToken;
            if (!silent) setFieldStatus('email', '检查中...', 'muted');

            try {
                const { ok, data } = await fetchRegisterAvailability({ email });
                if (currentToken !== emailCheckToken) return false;
                if (!ok) {
                    if (!silent) setFieldStatus('email', data.error || '检查失败，请稍后重试', 'error');
                    return false;
                }
                const available = !!data.email?.available;
                if (!silent) setFieldStatus('email', data.email?.message || (available ? '邮箱可用' : '邮箱已被注册'), available ? 'success' : 'error');
                return available;
            } catch (err) {
                if (currentToken !== emailCheckToken) return false;
                if (!silent) setFieldStatus('email', '检查失败，请稍后重试', 'error');
                return false;
            }
        }

        function bindAvailabilityChecks() {
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');

            usernameInput.addEventListener('input', () => {
                usernameCheckToken += 1;
                setFieldStatus('username');
            });
            usernameInput.addEventListener('blur', () => {
                if (usernameInput.value.trim()) checkUsernameAvailability();
            });

            emailInput.addEventListener('input', () => {
                emailCheckToken += 1;
                setFieldStatus('email');
            });
            emailInput.addEventListener('blur', () => {
                if (emailInput.value.trim() || emailVerificationRequired) {
                    checkEmailAvailability({ requireEmail: emailVerificationRequired });
                }
            });
        }

        async function beforeSendRegisterCode() {
            const emailOk = await checkEmailAvailability({ requireEmail: true });
            if (!emailOk) {
                return { ok: false, error: '邮箱不可用，请更换后再发送验证码' };
            }
            return true;
        }

        async function validateRegisterAvailabilityOnSubmit({ username, email }) {
            if (!username) {
                setFieldStatus('username', '请输入用户名', 'error');
                return { ok: false, error: '请输入用户名' };
            }

            if (username.length < 3 || username.length > 50) {
                setFieldStatus('username', '用户名需为3-50个字符', 'error');
                return { ok: false, error: '用户名需为3-50个字符' };
            }

            if (!email && emailVerificationRequired) {
                setFieldStatus('email', '请输入邮箱地址', 'error');
                return { ok: false, error: '请填写可用的邮箱地址' };
            }

            if (email && !isValidEmail(email)) {
                setFieldStatus('email', '请输入有效的邮箱地址', 'error');
                return { ok: false, error: emailVerificationRequired ? '请填写可用的邮箱地址' : '邮箱已被注册或格式不正确' };
            }

            const payload = { username };
            if (email) payload.email = email;

            setFieldStatus('username', '检查中...', 'muted');
            if (email || emailVerificationRequired) {
                setFieldStatus('email', '检查中...', 'muted');
            } else {
                setFieldStatus('email');
            }

            try {
                const { ok, data } = await fetchRegisterAvailability(payload);
                if (!ok) {
                    setFieldStatus('username');
                    if (email || emailVerificationRequired) {
                        setFieldStatus('email');
                    }
                    return { ok: false, error: data.error || '检查失败，请稍后重试' };
                }

                const usernameAvailable = !!data.username?.available;
                setFieldStatus(
                    'username',
                    data.username?.message || (usernameAvailable ? '用户名可用' : '用户名已被注册'),
                    usernameAvailable ? 'success' : 'error'
                );

                let emailAvailable = true;
                if (email) {
                    emailAvailable = !!data.email?.available;
                    setFieldStatus(
                        'email',
                        data.email?.message || (emailAvailable ? '邮箱可用' : '邮箱已被注册'),
                        emailAvailable ? 'success' : 'error'
                    );
                } else if (emailVerificationRequired) {
                    setFieldStatus('email', '请输入邮箱地址', 'error');
                    emailAvailable = false;
                } else {
                    setFieldStatus('email');
                }

                if (!usernameAvailable) {
                    return { ok: false, error: '请更换一个可用的用户名' };
                }

                if (!emailAvailable) {
                    return { ok: false, error: emailVerificationRequired ? '请填写可用的邮箱地址' : '邮箱已被注册或格式不正确' };
                }

                return { ok: true };
            } catch (err) {
                setFieldStatus('username', '检查失败，请稍后重试', 'error');
                if (email || emailVerificationRequired) {
                    setFieldStatus('email', '检查失败，请稍后重试', 'error');
                }
                return { ok: false, error: '检查失败，请稍后重试' };
            }
        }

        async function initRegisterPage() {
            bindAvailabilityChecks();

            try {
                const res = await fetch('/api/auth/email-verification-status');
                const data = await res.json();
                emailVerificationRequired = !!data.required;
                if (!emailVerificationRequired) return;

                document.getElementById('email-label').textContent = '邮箱 *';
                document.getElementById('email').required = true;
                document.getElementById('code-group').classList.remove('hidden');

                registerEmailCodeFlow = EmailVerificationFlow.create({
                    emailInput: '#email',
                    sendButton: '#sendCodeBtn',
                    purpose: 'register',
                    beforeOpen: beforeSendRegisterCode,
                    onError: showError,
                });
            } catch (err) {
                console.warn('Init register email verification failed:', err);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value.trim();
            const emailCode = document.getElementById('emailCode')?.value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            let shouldResetLoading = true;

            setRegisterLoading(true, '注册中...');

            try {
                if (password !== confirmPassword) {
                    showError('两次输入的密码不一致');
                    return;
                }

                const availability = await validateRegisterAvailabilityOnSubmit({ username, email });
                if (!availability.ok) {
                    showError(availability.error);
                    return;
                }

                if (emailVerificationRequired && !emailCode) {
                    showError('请输入邮箱验证码');
                    return;
                }

                const body = { username, password, nickname, email: email || undefined };
                if (emailCode) body.emailCode = emailCode;

                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) {
                    showError(data.error || '注册失败');
                    return;
                }

                Auth.setTokens(data.accessToken, data.refreshToken, data.user);
                shouldResetLoading = false;
                setRegisterLoading(true, '注册成功');
                window.location.href = '/';
            } catch (err) {
                showError('网络错误，请重试');
            } finally {
                if (shouldResetLoading) {
                    setRegisterLoading(false);
                }
            }
        }

        initRegisterPage();
    </script>
</body>
</html>
