<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - TikTok Live Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/email-verification-flow.js"></script>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center mb-2">TikTok Live Monitor</h2>
            <p class="text-center text-base-content/60 mb-6">创建新账户</p>

            <div id="errorMsg" class="alert alert-error hidden mb-4">
                <span id="errorText"></span>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">用户名 *</span></label>
                    <input type="text" id="username" class="input input-bordered w-full" placeholder="3-50个字符" required autofocus minlength="3" maxlength="50">
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">昵称</span></label>
                    <input type="text" id="nickname" class="input input-bordered w-full" placeholder="可选，显示名称">
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text" id="email-label">邮箱</span></label>
                    <input type="email" id="email" class="input input-bordered w-full" placeholder="可选">
                </div>
                <div class="form-control mb-4 hidden" id="code-group">
                    <label class="label"><span class="label-text">邮箱验证码 *</span></label>
                    <div class="join w-full">
                        <input type="text" id="emailCode" class="input input-bordered join-item flex-1" placeholder="6位数字" maxlength="6">
                        <button type="button" id="sendCodeBtn" class="btn btn-primary join-item">发送验证码</button>
                    </div>
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">密码 *</span></label>
                    <input type="password" id="password" class="input input-bordered w-full" placeholder="至少6个字符" required minlength="6">
                </div>
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text">确认密码 *</span></label>
                    <input type="password" id="confirmPassword" class="input input-bordered w-full" placeholder="再次输入密码" required>
                </div>
                <button type="submit" id="registerBtn" class="btn btn-primary w-full">
                    <span id="registerBtnText">注册</span>
                </button>
            </form>

            <div class="divider">或</div>
            <p class="text-center text-sm">
                已有账户？<a href="/login.html" class="link link-primary">立即登录</a>
            </p>
            <p class="text-center text-sm mt-2">
                <a href="/" class="link link-ghost opacity-60">返回首页</a>
            </p>
        </div>
    </div>

    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = '/';
        }

        let emailVerificationRequired = false;
        let registerEmailCodeFlow = null;

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }

        async function initRegisterPage() {
            try {
                const res = await fetch('/api/auth/email-verification-status');
                const data = await res.json();
                emailVerificationRequired = !!data.required;
                if (!emailVerificationRequired) return;

                document.getElementById('email-label').textContent = '邮箱 *';
                document.getElementById('email').required = true;
                document.getElementById('code-group').classList.remove('hidden');

                registerEmailCodeFlow = EmailVerificationFlow.create({
                    emailInput: '#email',
                    sendButton: '#sendCodeBtn',
                    purpose: 'register',
                    onError: showError,
                });
            } catch (err) {
                console.warn('Init register email verification failed:', err);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            hideError();

            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('registerBtnText');
            const username = document.getElementById('username').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value.trim();
            const emailCode = document.getElementById('emailCode')?.value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }
            if (emailVerificationRequired && !email) {
                showError('请输入邮箱地址');
                return;
            }
            if (emailVerificationRequired && !emailCode) {
                showError('请输入邮箱验证码');
                return;
            }

            btn.disabled = true;
            btnText.textContent = '注册中...';
            try {
                const body = { username, password, nickname, email: email || undefined };
                if (emailCode) body.emailCode = emailCode;

                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) {
                    btn.disabled = false;
                    btnText.textContent = '注册';
                    showError(data.error || '注册失败');
                    return;
                }

                Auth.setTokens(data.accessToken, data.refreshToken, data.user);
                btnText.textContent = '注册成功';
                window.location.href = '/';
            } catch (err) {
                btn.disabled = false;
                btnText.textContent = '注册';
                showError('网络错误，请重试');
            }
        }

        initRegisterPage();
    </script>
</body>
</html>
