<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TikTok Live Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center mb-2">TikTok Live Monitor</h2>
            <p class="text-center text-base-content/60 mb-6">登录您的账户</p>

            <div id="errorMsg" class="alert alert-error hidden mb-4">
                <span id="errorText"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">用户名</span></label>
                    <input type="text" id="username" class="input input-bordered w-full" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text">密码</span></label>
                    <input type="password" id="password" class="input input-bordered w-full" placeholder="请输入密码" required>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary w-full">登录</button>
            </form>

            <div class="divider">或</div>
            <p class="text-center text-sm">
                还没有账户？<a href="/register.html" class="link link-primary">立即注册</a>
            </p>
        </div>
    </div>

    <script>
        // If already logged in, redirect
        if (Auth.isLoggedIn()) {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('redirect') || '/';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            btn.classList.add('loading');
            errorMsg.classList.add('hidden');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const { ok, data } = await Auth.login(username, password);
            btn.classList.remove('loading');

            if (ok) {
                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('redirect') || '/';
            } else {
                errorText.textContent = data.error || '登录失败';
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
