<!DOCTYPE html>
<html lang="zh-CN" data-theme="business">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TikTok Live Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js?v=20260315a"></script>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center mb-2">TikTok Live Monitor</h2>
            <p class="text-center text-base-content/60 mb-6">登录您的账户</p>

            <div id="errorMsg" class="alert alert-error hidden mb-4">
                <span id="errorText"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">用户名或邮箱</span></label>
                    <input type="text" id="account" class="input input-bordered w-full" placeholder="请输入用户名或邮箱" required autofocus>
                </div>
                <div class="form-control mb-2">
                    <label class="label"><span class="label-text">密码</span></label>
                    <input type="password" id="password" class="input input-bordered w-full" placeholder="请输入密码" required>
                </div>
                <div class="text-right mb-4">
                    <a href="/forgot-password.html" class="link link-primary text-sm">忘记密码？</a>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary w-full">
                    <span id="loginBtnSpinner" class="loading loading-spinner loading-sm hidden" aria-hidden="true"></span>
                    <span id="loginBtnText">登录</span>
                </button>
            </form>

            <div class="divider">或</div>
            <p class="text-center text-sm">
                还没有账户？<a href="/register.html" class="link link-primary">立即注册</a>
            </p>
            <p class="text-center text-sm mt-2">
                <a href="/" class="link link-ghost opacity-60">返回首页</a>
            </p>
        </div>
    </div>

    <script src="/js/login-captcha-flow.js"></script>
    <script>
        let loginCaptcha = null;

        if (Auth.isLoggedIn()) {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('redirect') || '/';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.LoginImageCaptcha) {
                loginCaptcha = LoginImageCaptcha.create({
                    captchaUrl: '/api/auth/login-captcha'
                });
            }
        });

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message || '登录失败';
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }

        function setLoginLoading(loading, text = '登录') {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const btnSpinner = document.getElementById('loginBtnSpinner');
            btn.disabled = loading;
            btn.setAttribute('aria-busy', loading ? 'true' : 'false');
            btnSpinner.classList.toggle('hidden', !loading);
            btnText.textContent = text;
        }

        async function submitLogin(account, password, captchaPayload = null, priorCaptchaError = '') {
            const { ok, data } = await Auth.login(account, password, captchaPayload || {});
            if (ok) {
                setLoginLoading(true, '登录成功');
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect') || '/';
                window.location.href = redirect;
                return;
            }

            if (data.code === 'CAPTCHA_REQUIRED') {
                if (!loginCaptcha) {
                    throw new Error('验证码组件加载失败，请刷新页面后重试');
                }
                setLoginLoading(true, '等待验证...');
                const loginCaptchaPayload = await loginCaptcha.open(priorCaptchaError || (data.error !== '请先完成验证码验证' ? data.error : ''));
                return submitLogin(account, password, loginCaptchaPayload);
            }

            throw new Error(data.error || '登录失败');
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideError();
            setLoginLoading(true, '登录中...');

            const account = document.getElementById('account').value.trim();
            const password = document.getElementById('password').value;

            try {
                await submitLogin(account, password);
            } catch (err) {
                setLoginLoading(false, '登录');
                showError(err.message || '登录失败');
            }
        }
    </script>
</body>
</html>
