<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - TikTok Live Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="/css/slider-captcha.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/auth.js"></script>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold justify-center mb-2">TikTok Live Monitor</h2>
            <p class="text-center text-base-content/60 mb-6">登录您的账户</p>

            <div id="errorMsg" class="alert alert-error hidden mb-4">
                <span id="errorText"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">用户名或邮箱</span></label>
                    <input type="text" id="account" class="input input-bordered w-full" placeholder="请输入用户名或邮箱" required autofocus>
                </div>
                <div class="form-control mb-2">
                    <label class="label"><span class="label-text">密码</span></label>
                    <input type="password" id="password" class="input input-bordered w-full" placeholder="请输入密码" required>
                </div>
                <div class="text-right mb-4">
                    <a href="/forgot-password.html" class="link link-primary text-sm">忘记密码？</a>
                </div>

                <div class="slider-captcha-shell">
                    <div class="slider-captcha-card">
                        <div class="slider-captcha-head">
                            <div>
                                <div class="slider-captcha-title">安全验证</div>
                                <div class="slider-captcha-tip">请拖动滑块完成登录验证</div>
                            </div>
                        </div>
                        <div id="login-slider-captcha"></div>
                        <div id="login-slider-status" class="slider-captcha-status"></div>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary w-full">
                    <span id="loginBtnText">登录</span>
                </button>
            </form>

            <div class="divider">或</div>
            <p class="text-center text-sm">
                还没有账户？<a href="/register.html" class="link link-primary">立即注册</a>
            </p>
            <p class="text-center text-sm mt-2">
                <a href="/" class="link link-ghost opacity-60">返回首页</a>
            </p>
        </div>
    </div>

    <script src="/vendor/slider-captcha/longbow.slidercaptcha.js"></script>
    <script src="/js/slider-captcha-flow.js"></script>
    <script>
        let loginSliderCaptcha = null;

        if (Auth.isLoggedIn()) {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('redirect') || '/';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!window.sliderCaptcha || !window.SharedSliderCaptcha) {
                document.getElementById('login-slider-status').textContent = '滑块验证加载失败，请刷新后重试';
                document.getElementById('login-slider-status').className = 'slider-captcha-status is-error';
                return;
            }

            loginSliderCaptcha = SharedSliderCaptcha.create({
                purpose: 'login',
                widget: '#login-slider-captcha',
                status: '#login-slider-status',
                readyText: '请完成滑块验证',
                successText: '验证通过，可继续登录'
            });
        });

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            btn.disabled = true;
            btnText.textContent = '登录中...';
            errorMsg.classList.add('hidden');

            const account = document.getElementById('account').value.trim();
            const password = document.getElementById('password').value;
            const sliderPassToken = loginSliderCaptcha?.getPassToken() || '';

            if (!sliderPassToken) {
                btn.disabled = false;
                btnText.textContent = '登录';
                errorText.textContent = '请先完成滑块验证';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                const { ok, data } = await Auth.login(account, password, { sliderPassToken });

                if (ok) {
                    btnText.textContent = '登录成功';
                    const params = new URLSearchParams(window.location.search);
                    window.location.href = params.get('redirect') || '/';
                } else {
                    btn.disabled = false;
                    btnText.textContent = '登录';
                    errorText.textContent = data.error || '登录失败';
                    errorMsg.classList.remove('hidden');
                    loginSliderCaptcha?.reset('请重新完成滑块验证');
                }
            } catch (err) {
                btn.disabled = false;
                btnText.textContent = '登录';
                errorText.textContent = '网络错误，请重试';
                errorMsg.classList.remove('hidden');
                loginSliderCaptcha?.reset('请重新完成滑块验证');
            }
        }
    </script>
</body>
</html>
